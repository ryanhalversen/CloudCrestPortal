<!-- force-app/main/default/lwc/resourcePlanBoard/resourcePlanBoard.html -->
<template>
    <div class="plan-backdrop" onclick={handleBackdropClick}>
        <div class={boardCls} onclick={stopProp}>

            <!-- ── Header ──────────────────────────────────────────────────── -->
            <div class="plan-header">
                <div class="plan-title-row">
                    <div class="plan-title-left">
                        <h2 class="plan-title">Resource Planning Board</h2>
                        <span class="plan-subtitle">Live staffing &amp; capacity view</span>
                    </div>
                    <div class="plan-controls">
                        <button class="ctrl-btn ctrl-btn--undo" onclick={handleUndoClick}
                                disabled={canUndo} title="Undo (⌘Z)">↩ Undo</button>
                        <button class="ctrl-btn ctrl-btn--forecast" onclick={handleToggleChart}>{chartToggleLabel}</button>
                        <button class="ctrl-btn ctrl-btn--view" onclick={handleToggleView}>{viewModeLabel}</button>
                        <button class="ctrl-btn ctrl-btn--whatif" onclick={handleToggleWhatIf}>{whatIfLabel}</button>
                        <button class="plan-close" onclick={handleClose} title="Close">&times;</button>
                    </div>
                </div>

                <!-- What-If Banner -->
                <template if:true={isWhatIf}>
                    <div class="whatif-banner">
                        <span class="whatif-icon">⚠</span>
                        <span class="whatif-text">What-If Mode — changes are in-memory only</span>
                        <span class="whatif-count">{pendingCount} pending op(s)</span>
                        <template if:true={hasChanges}>
                            <button class="whatif-commit" onclick={handleCommit}>Commit Changes</button>
                            <button class="whatif-discard" onclick={handleDiscard}>Discard</button>
                        </template>
                    </div>
                </template>

                <!-- KPI Bar -->
                <template if:true={hasData}>
                    <div class="plan-kpi-bar">
                        <template for:each={kpis} for:item="k">
                            <div key={k.label} class={k.cls}>
                                <div class="kpi-val-row">
                                    <span class="kpi-val">{k.value}</span>
                                    <span class="kpi-trend">{k.trendIcon}</span>
                                </div>
                                <span class="kpi-lbl">{k.label}</span>
                                <span class="kpi-sub">{k.sub}</span>
                            </div>
                        </template>
                    </div>
                </template>
            </div>

            <!-- ── Loading / Error ─────────────────────────────────────────── -->
            <template if:true={isLoading}>
                <div class="plan-loading">
                    <div class="loading-spin"></div>
                    <span>Loading board data…</span>
                </div>
            </template>

            <template if:true={hasError}>
                <div class="plan-error">{error}</div>
            </template>

            <!-- ── Forecast Chart ──────────────────────────────────────────── -->
            <template if:true={hasData}>
                <template if:true={showChart}>
                    <div class="forecast-section">

                        <!-- Header row: title | mode toggle | stepper | KPI pills | legend -->
                        <div class="forecast-header">
                            <span class="forecast-title">24-Week Demand Forecast</span>
                            <div class="cmode-toggle">
                                <button class={chartModeDemandCls} onclick={handleChartModeDemand}>Demand</button>
                                <button class={chartModeTimelineCls} onclick={handleChartModeTimeline}>Timeline</button>
                            </div>
                            <template if:true={showDemandChart}>
                                <div class="forecast-stepper">
                                    <button class="step-btn" onclick={handlePrevWeek} disabled={chartData.cannotPrev}>&#8592;</button>
                                    <span class="step-label">{chartData.weekLabel}</span>
                                    <button class="step-btn" onclick={handleNextWeek} disabled={chartData.cannotNext}>&#8594;</button>
                                </div>
                                <div class="forecast-kpis">
                                    <div class="fcast-kpi">
                                        <span class="fcast-val">{chartData.wk4Util}%</span>
                                        <span class="fcast-lbl">WK 4</span>
                                    </div>
                                    <div class="fcast-kpi">
                                        <span class="fcast-val">{chartData.wk8Util}%</span>
                                        <span class="fcast-lbl">WK 8</span>
                                    </div>
                                    <div class="fcast-kpi">
                                        <span class="fcast-val">{chartData.selNetStr}</span>
                                        <span class="fcast-lbl">Net Wk {chartData.selDate}</span>
                                    </div>
                                </div>
                                <!-- Legend -->
                                <div class="forecast-legend">
                                    <span class="leg-item leg-item--demand">&#9644; On-Time Demand</span>
                                    <span class="leg-item leg-item--cap">- - Capacity</span>
                                    <span class="leg-item leg-item--forecast">- - Forecast</span>
                                </div>
                            </template>
                            <template if:true={showTimeline}>
                                <div class="forecast-legend">
                                    <span class="leg-item leg-item--demand">&#9644; Active Project</span>
                                    <span class="leg-item leg-item--forecast">- - Pipeline Opportunity</span>
                                    <span class="leg-item leg-item--cap">&#9646; Today</span>
                                </div>
                            </template>
                        </div>

                        <!-- SVG Chart (demand mode only) -->
                        <template if:true={showDemandChart}>
                        <svg class="forecast-svg forecast-svg--clickable" viewBox={chartData.viewBox}
                             onclick={handleChartClick}>

                            <!-- Chart background -->
                            <rect x={chartData.chartLeft} y={chartData.chartTop}
                                  width={chartData.chartRight} height={chartData.chartBottom}
                                  fill="rgba(15,23,42,0.4)" rx="2"/>

                            <!-- Y grid lines + labels -->
                            <template for:each={chartData.yGridLines} for:item="g">
                                <line key={g.key} x1={g.x1} y1={g.y1} x2={g.x2} y2={g.y2}
                                      stroke="#1e293b" stroke-width="1"/>
                                <text key={g.key} x={g.lx} y={g.ly} text-anchor="end"
                                      font-size="9" fill="#475569">{g.v}</text>
                            </template>

                            <!-- Project end markers -->
                            <template for:each={chartData.endMarkers} for:item="m">
                                <line key={m.key} x1={m.x} y1={m.y1} x2={m.x} y2={m.y2}
                                      stroke="#ef4444" stroke-width="0.8"
                                      stroke-dasharray="2,3" opacity="0.4"/>
                            </template>

                            <!-- Capacity line (teal dashed) -->
                            <line x1={chartData.capX1} y1={chartData.capY}
                                  x2={chartData.capX2} y2={chartData.capY}
                                  stroke="#00b4d8" stroke-width="1.5" stroke-dasharray="6,3"/>

                            <!-- Forecast line (white dashed) -->
                            <polyline points={chartData.forecastPoints}
                                      fill="none" stroke="rgba(255,255,255,0.5)"
                                      stroke-width="1.5" stroke-dasharray="5,4"/>

                            <!-- Demand line (orange) -->
                            <polyline points={chartData.demandPoints}
                                      fill="none" stroke="#f59e0b" stroke-width="2"/>

                            <!-- Forecast dots -->
                            <template for:each={chartData.forecastDots} for:item="d">
                                <circle key={d.key} cx={d.cx} cy={d.cy} r="2.5"
                                        fill="rgba(255,255,255,0.5)"/>
                            </template>

                            <!-- Demand dots -->
                            <template for:each={chartData.demandDots} for:item="d">
                                <circle key={d.key} cx={d.cx} cy={d.cy} r="3"
                                        fill="#f59e0b"/>
                            </template>

                            <!-- Selected week cursor -->
                            <line x1={chartData.cursorX} y1={chartData.cursorTop}
                                  x2={chartData.cursorX} y2={chartData.cursorBottom}
                                  stroke="white" stroke-width="1.5" opacity="0.35"/>

                            <!-- X-axis date labels -->
                            <template for:each={chartData.xLabels} for:item="l">
                                <text key={l.key} x={l.x} y={l.y} text-anchor="middle"
                                      font-size="9" fill="#64748b">{l.label}</text>
                            </template>

                            <!-- Utilization % labels -->
                            <template for:each={chartData.utilLabels} for:item="u">
                                <text key={u.key} x={u.x} y={u.y} text-anchor="middle"
                                      font-size="8" fill={u.color}>{u.label}</text>
                            </template>

                        </svg>
                        </template>

                        <!-- Timeline (Gantt) chart -->
                        <template if:true={showTimeline}>
                            <template if:true={timelineData}>
                                <div class="timeline-container">
                                    <svg class="timeline-svg" viewBox={timelineData.viewBox}>
                                        <!-- Chart background -->
                                        <rect x={timelineData.bgX} y={timelineData.bgY}
                                              width={timelineData.bgW} height={timelineData.bgH}
                                              fill="rgba(15,23,42,0.4)"/>
                                        <!-- Left-column separator -->
                                        <line x1={timelineData.divX} y1={timelineData.bgY}
                                              x2={timelineData.divX} y2={timelineData.todayY2}
                                              stroke="#1e293b" stroke-width="1"/>
                                        <!-- Vertical grid lines (month boundaries) -->
                                        <template for:each={timelineData.vGridLines} for:item="g">
                                            <line key={g.key} x1={g.x} y1={g.y1} x2={g.x} y2={g.y2}
                                                  stroke="#1e293b" stroke-width="1"/>
                                        </template>
                                        <!-- Group header backgrounds -->
                                        <template for:each={timelineData.grpRects} for:item="r">
                                            <rect key={r.key} x="0" y={r.y} width={timelineData.svgW} height={r.h}
                                                  fill="rgba(10,22,40,0.85)"/>
                                        </template>
                                        <!-- Group header texts (account names) -->
                                        <template for:each={timelineData.grpTexts} for:item="t">
                                            <text key={t.key} x="6" y={t.y}
                                                  font-size="8" font-weight="700" fill="#475569">{t.text}</text>
                                        </template>
                                        <!-- Horizontal dividers between groups -->
                                        <template for:each={timelineData.hLines} for:item="l">
                                            <line key={l.key} x1="0" y1={l.y} x2={timelineData.svgW} y2={l.y}
                                                  stroke="#1e293b" stroke-width="1"/>
                                        </template>
                                        <!-- Bars (projects + pipeline) -->
                                        <template for:each={timelineData.bars} for:item="b">
                                            <rect key={b.key} x={b.x} y={b.y} width={b.width} height={b.height}
                                                  fill={b.fill} stroke={b.stroke} stroke-dasharray={b.strokeDash}
                                                  opacity={b.opacity} rx="3"/>
                                        </template>
                                        <!-- Row labels (left column) -->
                                        <template for:each={timelineData.rowLabels} for:item="l">
                                            <text key={l.key} x={l.x} y={l.y}
                                                  font-size="9" fill={l.fill}>{l.text}</text>
                                        </template>
                                        <!-- Today line -->
                                        <line x1={timelineData.todayX} y1={timelineData.todayY1}
                                              x2={timelineData.todayX} y2={timelineData.todayY2}
                                              stroke="#00b4d8" stroke-width="1.5" opacity="0.7"/>
                                        <!-- X-axis labels -->
                                        <template for:each={timelineData.xLabels} for:item="l">
                                            <text key={l.key} x={l.x} y={l.y} text-anchor="middle"
                                                  font-size="9" fill="#64748b">{l.label}</text>
                                        </template>
                                    </svg>
                                </div>
                            </template>
                        </template>

                        <!-- Breakdown: Projects + Pipeline side by side -->
                        <template if:true={forecastBreakdown}>
                            <div class="forecast-breakdown">
                                <!-- Active Projects column -->
                                <div class="breakdown-col">
                                    <div class="breakdown-col-header">
                                        <span class="breakdown-col-title">Active Projects</span>
                                        <span class="breakdown-col-count">{forecastBreakdown.projects.length} projects</span>
                                        <button class={forecastBreakdown.sortHoursCls}
                                                data-sort="hours"
                                                onclick={handleBreakdownSort}>{forecastBreakdown.sortHoursLbl}</button>
                                        <button class={forecastBreakdown.sortEndDateCls}
                                                data-sort="endDate"
                                                onclick={handleBreakdownSort}>{forecastBreakdown.sortEndDateLbl}</button>
                                    </div>
                                    <template for:each={forecastBreakdown.projects} for:item="proj">
                                        <div key={proj.id} class="breakdown-row">
                                            <span class="breakdown-dot" style={proj.colorStyle}></span>
                                            <span class="breakdown-name card-name--link"
                                                  data-record-id={proj.id}
                                                  onclick={handleRecordClick}>{proj.name}</span>
                                            <template if:true={proj.isBlock}>
                                                <span class="breakdown-block-lbl">Block</span>
                                            </template>
                                            <template if:false={proj.isBlock}>
                                                <span class="breakdown-hrs">{proj.weeklyHrs}h/wk</span>
                                            </template>
                                            <span class={proj.dateCls}>{proj.endDate}</span>
                                        </div>
                                    </template>
                                </div>
                                <!-- Pipeline Forecast column -->
                                <div class="breakdown-col breakdown-col--pipe">
                                    <div class="breakdown-col-header">
                                        <span class="breakdown-col-title">Pipeline Forecast</span>
                                        <span class="breakdown-col-count">{forecastBreakdown.pipeline.length} open opportunities</span>
                                    </div>
                                    <template if:true={forecastBreakdown.hasPipeline}>
                                        <template for:each={forecastBreakdown.pipeline} for:item="opp">
                                            <div key={opp.id} class="breakdown-row">
                                                <span class="breakdown-name card-name--link"
                                                      data-record-id={opp.id}
                                                      onclick={handleRecordClick}>{opp.name}</span>
                                                <span class="breakdown-hrs">{opp.weeklyHrs}h/wk</span>
                                                <span class="breakdown-prob">{opp.probability}%</span>
                                                <span class={opp.startCls}>{opp.expectedStart}</span>
                                            </div>
                                        </template>
                                    </template>
                                    <template if:false={forecastBreakdown.hasPipeline}>
                                        <p class="breakdown-empty">No pipeline starting by this week</p>
                                    </template>
                                </div>
                            </div>
                        </template>

                    </div>
                </template>
            </template>

            <!-- ── Main Board ──────────────────────────────────────────────── -->
            <template if:true={hasData}>
                <div class="plan-body">

                    <!-- Org Chart Tree -->
                    <div class="org-tree">

                        <!-- Tier 1: Leader card (centered) -->
                        <template if:true={leaderLane}>
                            <div class="org-leader-row">
                                <div class="org-card--leader">
                                    <div class="org-leader-left">
                                        <div class="org-leader-avatar">{leaderLane.initials}</div>
                                        <div class="org-leader-info">
                                            <span class="org-leader-name">{leaderLane.name}</span>
                                            <span class="org-leader-role">Head of Delivery</span>
                                        </div>
                                    </div>
                                    <div class="org-leader-metrics">
                                        <div class="leader-metric">
                                            <span class="leader-metric-val">{leaderMetrics.capacity}h</span>
                                            <span class="leader-metric-lbl">FTE Capacity</span>
                                        </div>
                                        <div class="leader-metric">
                                            <span class="leader-metric-val">{leaderMetrics.demand}h</span>
                                            <span class="leader-metric-lbl">On-Time Demand</span>
                                        </div>
                                        <div class="leader-metric">
                                            <span class={leaderMetrics.netCls}>{leaderMetrics.netStr}</span>
                                            <span class="leader-metric-lbl">Net Available</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div class="org-root-vline"></div>
                        </template>

                        <!-- Tier 2+3: FTE columns with project trees -->
                        <div class="org-fte-row">
                            <template for:each={fteTeamLanes} for:item="lane">
                                <div key={lane.id} class={lane.branchCls}
                                     data-user-id={lane.id}
                                     ondragover={handleLaneDragOver}
                                     ondragleave={handleLaneDragLeave}
                                     ondrop={handleLaneDrop}>

                                    <!-- FTE Card (click to drill down) -->
                                    <div class="org-card--fte org-card--fte-clickable"
                                         data-fte-id={lane.id}
                                         onclick={handleFteCardClick}>
                                        <div class="org-fte-top">
                                            <div class="org-fte-avatar">{lane.initials}</div>
                                            <div class="org-fte-info">
                                                <span class="org-fte-name">{lane.name}</span>
                                                <span class="org-fte-role">{lane.roleLabel}</span>
                                            </div>
                                            <span class="delivery-badge" style={lane.deliveryBadgeStyle}>{lane.deliveryShort}</span>
                                        </div>
                                        <div class="org-fte-cap">
                                            <div class="cap-bar-track">
                                                <div class="cap-bar-fill" style={lane.barStyle}></div>
                                            </div>
                                            <div class="cap-labels">
                                                <span class="cap-alloc">{lane.utilLabel}</span>
                                                <span class="cap-avail">{lane.availLabel}</span>
                                            </div>
                                        </div>
                                    </div>

                                    <!-- FTE-level contractors (docked directly under FTE card) -->
                                    <template if:true={lane.hasFteContractors}>
                                        <div class="org-fte-cont-section">
                                            <template for:each={lane.fteContractors} for:item="fc">
                                                <div key={fc.assignmentId} class="org-fte-cont-item">
                                                    <div class="org-fte-cont-vline"></div>
                                                    <div class="org-fte-cont-card">
                                                        <div class="org-fte-cont-avatar">{fc.initials}</div>
                                                        <div class="org-fte-cont-info">
                                                            <span class="org-fte-cont-name">{fc.name}</span>
                                                            <span class="org-fte-cont-hrs">{fc.availableHours}h/wk avail</span>
                                                        </div>
                                                        <button class="cont-remove-btn"
                                                                data-assignment-id={fc.assignmentId}
                                                                onclick={handleRemoveCard}
                                                                title="Remove">&times;</button>
                                                    </div>
                                                </div>
                                            </template>
                                        </div>
                                    </template>

                                    <!-- Vertical drop + project row -->
                                    <template if:true={lane.hasCards}>
                                        <div class="org-fte-vline"></div>
                                        <div class="org-proj-row">
                                            <template for:each={lane.cards} for:item="card">
                                                <div key={card.assignmentId} class={card.projBranchCls}>
                                                    <div class="proj-and-cont-row">
                                                    <div class={card.cardCls}
                                                         style={card.colorStyle}
                                                         draggable="true"
                                                         data-drag-type="project"
                                                         data-id={card.assignmentId}
                                                         data-project-id={card.projectId}
                                                         data-from-user-id={lane.id}
                                                         ondragstart={handleDragStart}
                                                         ondragend={handleDragEnd}
                                                         ondragover={handleCardDragOver}
                                                         ondrop={handleCardDrop}>

                                                        <div class="card-top-row">
                                                            <span class="card-name card-name--link"
                                                                  data-record-id={card.recordId}
                                                                  onclick={handleRecordClick}>{card.name}</span>
                                                            <template if:true={card.canRemove}>
                                                                <button class="card-remove"
                                                                        data-assignment-id={card.assignmentId}
                                                                        onclick={handleRemoveCard}
                                                                        title="Remove">&times;</button>
                                                            </template>
                                                        </div>
                                                        <span class="card-client">{card.client}</span>

                                                        <!-- Delivery type badge -->
                                                        <span class={card.deliveryBadgeCls} style={card.deliveryBadgeStyle}>{card.deliveryBadge}</span>

                                                        <template if:false={card.isBlock}>
                                                            <div class="card-hours-row">
                                                                <span class="card-hrs-label">hrs/wk</span>
                                                                <template if:false={card.isPipeline}>
                                                                    <span class="card-hrs">{card.hoursPerWeek}</span>
                                                                </template>
                                                                <template if:true={card.isPipeline}>
                                                                    <template if:false={card.isEditing}>
                                                                        <span class="card-hrs"
                                                                              data-assignment-id={card.assignmentId}
                                                                              onclick={handleHoursClick}>{card.hoursPerWeek}</span>
                                                                    </template>
                                                                    <template if:true={card.isEditing}>
                                                                        <input type="number"
                                                                               class="hours-input"
                                                                               value={card.editValue}
                                                                               min="0" step="0.5"
                                                                               data-assignment-id={card.assignmentId}
                                                                               oninput={handleHoursInput}
                                                                               onblur={handleHoursBlur}
                                                                               onkeydown={handleHoursKeydown} />
                                                                    </template>
                                                                </template>
                                                            </div>
                                                        </template>

                                                        <template if:false={card.isPipeline}>
                                                            <div class="card-footer">
                                                                <span class="card-end">{card.endDate}</span>
                                                                <template if:true={card.showRemaining}>
                                                                    <span class="card-remaining">{card.remainingHours}h left</span>
                                                                </template>
                                                                <template if:true={card.showUrgency}>
                                                                    <span class={card.urgencyCls}>{card.urgencyLabel}</span>
                                                                </template>
                                                            </div>
                                                        </template>

                                                        <template if:true={card.isPipeline}>
                                                            <div class="card-footer">
                                                                <span class="card-stage">{card.stage}</span>
                                                                <span class="card-prob">{card.probability}%</span>
                                                            </div>
                                                        </template>

                                                    </div>
                                                    <!-- Project-level contractor (to the right) -->
                                                    <template if:true={card.hasProjContractors}>
                                                        <div class="proj-cont-connector"></div>
                                                        <div class="proj-cont-stack">
                                                            <template for:each={card.projContractors} for:item="pc">
                                                                <div key={pc.assignmentId} class="proj-cont-card">
                                                                    <div class="proj-cont-avatar">{pc.initials}</div>
                                                                    <div class="proj-cont-info">
                                                                        <span class="proj-cont-name">{pc.name}</span>
                                                                        <span class="proj-cont-avail">{pc.availableHours}h/wk</span>
                                                                    </div>
                                                                    <button class="cont-remove-btn"
                                                                            data-assignment-id={pc.assignmentId}
                                                                            onclick={handleRemoveCard}
                                                                            title="Remove">&times;</button>
                                                                </div>
                                                            </template>
                                                        </div>
                                                    </template>
                                                    </div><!-- end proj-and-cont-row -->
                                                </div>
                                            </template>
                                        </div>
                                    </template>

                                    <!-- Drop hint -->
                                    <div class="drop-hint">Drop project here</div>

                                </div>
                            </template>
                        </div>

                        <!-- Unassigned Projects Pool -->
                        <template if:true={hasUnassigned}>
                            <div class="unassigned-pool unassigned-pool--org">
                                <h4 class="unassigned-title">Unassigned Projects</h4>
                                <div class="unassigned-cards">
                                    <template for:each={unassignedProjects} for:item="proj">
                                        <div key={proj.id} class="plan-card plan-card--unassigned"
                                             style={proj.cardStyle}
                                             draggable="true"
                                             data-drag-type="unassigned"
                                             data-id={proj.id}
                                             ondragstart={handleDragStart}
                                             ondragend={handleDragEnd}>
                                            <span class="card-name card-name--link"
                                                  data-record-id={proj.id}
                                                  onclick={handleRecordClick}>{proj.name}</span>
                                            <span class="card-client">{proj.client}</span>
                                            <span class="card-hrs">{proj.weeklyPace}h/wk</span>
                                        </div>
                                    </template>
                                </div>
                            </div>
                        </template>

                        <!-- Contractor Pool -->
                        <template if:true={hasContractorPool}>
                            <div class="cont-pool-section">
                                <div class="cont-pool-header">
                                    <span class="cont-pool-title">Contractor Pool</span>
                                    <span class="cont-pool-hint">Drag to an FTE column or onto a project card</span>
                                </div>
                                <template if:false={noUnassignedContractors}>
                                    <div class="cont-pool-cards">
                                        <template for:each={contractorPoolUnassigned} for:item="c">
                                            <div key={c.id} class="cont-pool-card"
                                                 draggable="true"
                                                 data-drag-type="contractor"
                                                 data-id={c.id}
                                                 ondragstart={handleDragStart}
                                                 ondragend={handleDragEnd}>
                                                <div class="cont-pool-avatar">{c.initials}</div>
                                                <div class="cont-pool-info">
                                                    <span class="cont-pool-name">{c.name}</span>
                                                    <span class="cont-pool-avail">{c.availableHours}h/wk</span>
                                                </div>
                                            </div>
                                        </template>
                                    </div>
                                </template>
                                <template if:true={noUnassignedContractors}>
                                    <p class="cont-pool-empty">All contractors assigned</p>
                                </template>
                            </div>
                        </template>

                    </div>

                </div>
            </template>

            <!-- FTE Drill-Down Overlay -->
            <template if:true={showDrill}>
                <div class="fte-drill-overlay" onclick={handleDrillBackdrop}>
                    <div class="fte-drill-panel">
                        <div class="fte-drill-topbar">
                            <span class="fte-drill-topbar-title">Team Member Detail</span>
                            <button class="plan-close" onclick={handleDrillClose}>&times;</button>
                        </div>
                        <div class="fte-drill-body">
                            <!-- Enlarged FTE card -->
                            <div class="fte-drill-fte-card">
                                <div class="org-fte-avatar fte-drill-avatar">{drillFte.initials}</div>
                                <div class="fte-drill-fte-info">
                                    <span class="fte-drill-fte-name">{drillFte.name}</span>
                                    <span class="fte-drill-fte-role">{drillFte.roleLabel}</span>
                                    <div class="cap-bar-track fte-drill-bar-track">
                                        <div class="cap-bar-fill" style={drillFte.barStyle}></div>
                                    </div>
                                    <div class="cap-labels">
                                        <span class="cap-alloc">{drillFte.utilLabel}</span>
                                        <span class="cap-avail">{drillFte.availLabel}</span>
                                    </div>
                                </div>
                                <span class="delivery-badge delivery-badge--drill" style={drillFte.deliveryBadgeStyle}>{drillFte.deliveryShort}</span>
                            </div>

                            <!-- FTE-level contractors -->
                            <template if:true={drillFte.hasFteContractors}>
                                <div class="fte-drill-sect-lbl">Supporting this FTE</div>
                                <div class="fte-drill-cont-row">
                                    <template for:each={drillFte.fteContractors} for:item="fc">
                                        <div key={fc.assignmentId} class="fte-drill-cont-card">
                                            <div class="org-fte-cont-avatar">{fc.initials}</div>
                                            <div class="org-fte-cont-info">
                                                <span class="org-fte-cont-name">{fc.name}</span>
                                                <span class="org-fte-cont-hrs">{fc.availableHours}h/wk</span>
                                            </div>
                                        </div>
                                    </template>
                                </div>
                            </template>

                            <!-- Projects -->
                            <div class="fte-drill-sect-lbl">Projects</div>
                            <div class="fte-drill-proj-grid">
                                <template for:each={drillFte.cards} for:item="card">
                                    <div key={card.assignmentId} class="fte-drill-proj-wrap">
                                        <div class={card.cardCls} style={card.colorStyle}>
                                            <div class="card-top-row">
                                                <span class="card-name card-name--link"
                                                      data-record-id={card.recordId}
                                                      onclick={handleRecordClick}>{card.name}</span>
                                            </div>
                                            <span class="card-client">{card.client}</span>
                                            <span class={card.deliveryBadgeCls} style={card.deliveryBadgeStyle}>{card.deliveryBadge}</span>
                                            <template if:false={card.isBlock}>
                                                <div class="card-hours-row">
                                                    <span class="card-hrs-label">hrs/wk</span>
                                                    <span class="card-hrs">{card.hoursPerWeek}</span>
                                                </div>
                                            </template>
                                            <div class="card-footer">
                                                <span class="card-end">{card.endDate}</span>
                                                <template if:true={card.showRemaining}>
                                                    <span class="card-remaining">{card.remainingHours}h left</span>
                                                </template>
                                                <template if:true={card.showUrgency}>
                                                    <span class={card.urgencyCls}>{card.urgencyLabel}</span>
                                                </template>
                                            </div>
                                        </div>
                                        <!-- Project-level contractors in drill view -->
                                        <template if:true={card.hasProjContractors}>
                                            <div class="proj-cont-connector"></div>
                                            <div class="proj-cont-stack">
                                                <template for:each={card.projContractors} for:item="pc">
                                                    <div key={pc.assignmentId} class="proj-cont-card">
                                                        <div class="proj-cont-avatar">{pc.initials}</div>
                                                        <div class="proj-cont-info">
                                                            <span class="proj-cont-name">{pc.name}</span>
                                                            <span class="proj-cont-avail">{pc.availableHours}h/wk</span>
                                                        </div>
                                                    </div>
                                                </template>
                                            </div>
                                        </template>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </div>
                </div>
            </template>

            <!-- Chart click tooltip -->
            <template if:true={dotTooltip}>
                <div class="chart-tooltip" style={dotTooltip.style} onclick={stopProp}>
                    <div class="tt-header-row">
                        <div class="tt-date">{dotTooltip.dateLabel}</div>
                        <button class="tt-close" onclick={handleTooltipClose}>&times;</button>
                    </div>
                    <!-- Combined total at top -->
                    <div class="tt-combined">
                        <span class="tt-combined-lbl">Total Forecast</span>
                        <span class="tt-combined-val">{dotTooltip.totalForecast}h</span>
                    </div>
                    <!-- On-Time Demand section -->
                    <div class="tt-section">
                        <div class="tt-section-lbl">On-Time Demand — <span class="tt-total">{dotTooltip.totalDemand}h</span></div>
                        <template for:each={dotTooltip.projects} for:item="p">
                            <div key={p.id} class="tt-row">
                                <span class="tt-dot" style={p.colorStyle}></span>
                                <span class="tt-name">{p.name}</span>
                                <span class="tt-hrs">{p.hrs}h</span>
                            </div>
                        </template>
                    </div>
                    <!-- Pipeline section -->
                    <template if:true={dotTooltip.hasPipeline}>
                        <div class="tt-section tt-section--pipe">
                            <div class="tt-section-lbl tt-section-lbl--pipe">Pipeline — <span class="tt-total">{dotTooltip.pipelineTotal}h</span></div>
                            <template for:each={dotTooltip.pipeline} for:item="o">
                                <div key={o.id} class="tt-row tt-row--pipe">
                                    <span class="tt-name">{o.name}</span>
                                    <span class="tt-hrs">{o.hrs}h</span>
                                </div>
                            </template>
                        </div>
                    </template>
                </div>
            </template>

        </div>
    </div>
</template>
