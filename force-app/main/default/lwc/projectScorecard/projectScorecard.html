<template>
    <div class="scorecard-wrapper">

        <div class="scorecard-header">
            <span class="scorecard-title">Project Scorecards</span>
            <div class="view-toggle">
                <button class={myBtnClass} onclick={showMine}>My Projects</button>
                <button class={allBtnClass} onclick={showAll}>All Projects</button>
            </div>
        </div>

        <template if:true={isLoading}>
            <div class="state-msg">Loading projects...</div>
        </template>

        <template if:false={isLoading}>
            <template if:true={hasProjects}>

                <!-- ── My Projects: Card Grid ── -->
                <template if:false={isAllMode}>
                    <div class="cards-grid">
                        <template for:each={projects} for:item="p">
                            <div key={p.Id} class="project-card"
                                 data-id={p.Id} data-name={p.Name}
                                 onclick={handleCardClick}
                                 onmouseenter={handleRowEnter}
                                 onmouseleave={handleRowLeave}>

                                <div class="card-top">
                                    <div class="project-name">{p.Name}</div>
                                    <div class="card-top-right">
                                        <span class={p.paceBadgeClass}>{p.paceBadgeLabel}</span>
                                        <button class="btn-open-record" data-id={p.Id} onclick={navigateToRecord}>
                                            <lightning-icon icon-name="utility:new_window" size="x-small"></lightning-icon>
                                            Open
                                        </button>
                                    </div>
                                </div>

                                <!-- Dual Progress Bar -->
                                <div class="dual-bar-section">
                                    <div class="bar-row">
                                        <span class="bar-label">Timeline</span>
                                        <div class="bar-track">
                                            <div class="bar-fill bar-timeline" style={p.progressStyle}></div>
                                        </div>
                                        <span class="bar-pct">{p.timelinePercent}%</span>
                                    </div>
                                    <div class="bar-row">
                                        <span class="bar-label">Hours</span>
                                        <div class="bar-track">
                                            <div class="bar-fill" style={p.hoursBarStyle}></div>
                                        </div>
                                        <span class="bar-pct">{p.hoursPercent}%</span>
                                    </div>
                                    <div class="delta-chip-row">
                                        <span class={p.deltaClass}>{p.deltaLabel}</span>
                                        <span class="date-range">{p.startDate} → {p.endDate}</span>
                                    </div>
                                </div>

                                <div class="stats-row">
                                    <div class="stat stat-divider">
                                        <div class="stat-label">Purchased</div>
                                        <div class="stat-value">{p.hoursPurchased}</div>
                                        <div class="stat-sub">hrs</div>
                                    </div>
                                    <div class="stat stat-divider">
                                        <div class="stat-label">Delivered</div>
                                        <div class="stat-value">{p.hoursDelivered}</div>
                                        <div class="stat-sub">hrs</div>
                                    </div>
                                    <div class="stat stat-divider">
                                        <div class="stat-label">Remaining</div>
                                        <div class="stat-value">{p.hoursRemaining}</div>
                                        <div class="stat-sub">hrs</div>
                                    </div>
                                    <div class="stat">
                                        <div class="stat-label">Sprint Pace</div>
                                        <div class="stat-value stat-value-sprint">{p.weeklySprintHours}</div>
                                        <div class="stat-sub">per week</div>
                                    </div>
                                </div>

                            </div>
                        </template>
                    </div>
                </template>

                <!-- ── All Projects: Compact Table ── -->
                <template if:true={isAllMode}>
                    <div class="project-table">
                        <!-- Sortable header -->
                        <div class="table-header-row">
                            <span class={thClsName}      data-field="Name"            onclick={handleSort}>{thLabelName}</span>
                            <span class={thClsPace}      data-field="paceBadgeLabel"  onclick={handleSort}>{thLabelPace}</span>
                            <span class={thClsPurchased} data-field="hoursPurchased"  onclick={handleSort} style="text-align:center">{thLabelPurchased}</span>
                            <span class={thClsDelivered} data-field="hoursDelivered"  onclick={handleSort} style="text-align:center">{thLabelDelivered}</span>
                            <span class={thClsTimeline}  data-field="timelinePercent" onclick={handleSort}>{thLabelTimeline}</span>
                            <span class={thClsDelta}     data-field="deltaRaw"        onclick={handleSort}>{thLabelDelta}</span>
                            <span class={thClsRemaining} data-field="hoursRemaining"  onclick={handleSort} style="text-align:center">{thLabelRemaining}</span>
                            <span class="th"></span>
                        </div>

                        <template for:each={projects} for:item="p">
                            <div key={p.Id} class="table-row"
                                 data-id={p.Id} data-name={p.Name}
                                 onclick={handleCardClick}
                                 onmouseenter={handleRowEnter}
                                 onmouseleave={handleRowLeave}>

                                <div class="td-name-group">
                                    <div class="td-name">{p.Name}</div>
                                    <div class="td-account">{p.accountName}</div>
                                </div>

                                <span class={p.paceBadgeClass}>{p.paceBadgeLabel}</span>

                                <div>
                                    <div class="td-stat">{p.hoursPurchased}</div>
                                    <div class="td-stat-label">hrs</div>
                                </div>

                                <div>
                                    <div class="td-stat">{p.hoursDelivered}</div>
                                    <div class="td-stat-label">hrs</div>
                                </div>

                                <div class="td-bars">
                                    <div class="mini-dual">
                                        <span class="mini-bar-label">T</span>
                                        <div class="mini-track">
                                            <div class="mini-fill mini-timeline" style={p.progressStyle}></div>
                                        </div>
                                        <span class="mini-pct">{p.timelinePercent}%</span>
                                    </div>
                                    <div class="mini-dual">
                                        <span class="mini-bar-label">H</span>
                                        <div class="mini-track">
                                            <div class="mini-fill" style={p.hoursBarStyle}></div>
                                        </div>
                                        <span class="mini-pct">{p.hoursPercent}%</span>
                                    </div>
                                </div>

                                <span class={p.deltaClass}>{p.deltaLabel}</span>

                                <div class="td-rem">{p.hoursRemaining}h</div>

                                <button class="btn-row-open" data-id={p.Id} onclick={navigateToRecord}>↗</button>
                            </div>
                        </template>
                    </div>
                </template>

            </template>

            <template if:false={hasProjects}>
                <div class="state-msg">No In Progress projects found.</div>
            </template>
        </template>

        <!-- ── Hover Card ── -->
        <template if:true={hoverProject}>
            <div class="hover-card" style={hoverStyle}>
                <div class="hc-top">
                    <div class="hc-name">{hoverProject.Name}</div>
                    <span class={hoverProject.paceBadgeClass}>{hoverProject.paceBadgeLabel}</span>
                </div>
                <template if:true={hoverProject.accountName}>
                    <div class="hc-account">{hoverProject.accountName}</div>
                </template>
                <div class="hc-dates">{hoverProject.startDate} → {hoverProject.endDate}</div>

                <div class="hc-bars">
                    <div class="bar-row">
                        <span class="bar-label">Timeline</span>
                        <div class="bar-track">
                            <div class="bar-fill bar-timeline" style={hoverProject.progressStyle}></div>
                        </div>
                        <span class="bar-pct">{hoverProject.timelinePercent}%</span>
                    </div>
                    <div class="bar-row">
                        <span class="bar-label">Hours</span>
                        <div class="bar-track">
                            <div class="bar-fill" style={hoverProject.hoursBarStyle}></div>
                        </div>
                        <span class="bar-pct">{hoverProject.hoursPercent}%</span>
                    </div>
                    <div class="hc-delta-row">
                        <span class={hoverProject.deltaClass}>{hoverProject.deltaLabel}</span>
                    </div>
                </div>

                <div class="hc-stats">
                    <div class="hc-stat">
                        <div class="hc-stat-val">{hoverProject.hoursPurchased}</div>
                        <div class="hc-stat-lbl">Purchased</div>
                    </div>
                    <div class="hc-stat">
                        <div class="hc-stat-val">{hoverProject.hoursDelivered}</div>
                        <div class="hc-stat-lbl">Delivered</div>
                    </div>
                    <div class="hc-stat">
                        <div class="hc-stat-val">{hoverProject.hoursRemaining}</div>
                        <div class="hc-stat-lbl">Remaining</div>
                    </div>
                    <div class="hc-stat">
                        <div class="hc-stat-val hc-stat-val-pace">{hoverProject.weeklySprintHours}</div>
                        <div class="hc-stat-lbl">Sprint pace</div>
                    </div>
                </div>
            </div>
        </template>

    </div>
</template>
