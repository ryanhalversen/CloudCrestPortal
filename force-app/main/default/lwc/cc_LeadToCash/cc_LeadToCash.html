<template>
    <div class="board-wrapper">

        <!-- ── Left: Lead to Cash Board ─────────────────────── -->
        <div class="board-main">
            <div class="board-header">
                <h2 class="board-title">Lead to Cash</h2>
                <p class="board-subtitle">Cloudcraft &mdash; Process, Ownership &amp; Artifacts</p>
            </div>

            <div class="board-funnel">
                <template for:each={stageGroups} for:item="group">
                    <div key={group.id} class="funnel-tier-outer">

                        <div class={group.bandClass} style={group.funnelStyle}>
                            <div class="funnel-band-header">
                                <div class={group.labelClass}>{group.label}</div>
                                <button class="add-sop-btn"
                                        data-category={group.category}
                                        data-label={group.label}
                                        onclick={handleAddClick}
                                        title="Add SOP">
                                    + Add SOP
                                </button>
                            </div>
                            <div class="funnel-band-scroll">
                                <div class="funnel-band-cards">
                                    <template for:each={group.stages} for:item="stage">
                                        <div key={stage.id}
                                             class="stage-column"
                                             draggable="true"
                                             data-id={stage.id}
                                             data-category={stage.category}
                                             onclick={handleCardClick}
                                             ondragstart={handleDragStart}
                                             ondragend={handleDragEnd}
                                             ondragover={handleSopDragOver}
                                             ondragleave={handleSopDragLeave}
                                             ondrop={handleSopDrop}>

                                            <!-- Stage Header -->
                                            <div class="stage-header">
                                                <div class="stage-title-row">
                                                    <span class="stage-number">{stage.num}</span>
                                                    <span class="stage-name">{stage.title}</span>
                                                </div>
                                                <div class="card-reorder-btns">
                                                    <button class="card-move-btn"
                                                            data-id={stage.id}
                                                            data-category={stage.category}
                                                            disabled={stage.isFirstCard}
                                                            onclick={handleMoveLeft}
                                                            title="Move left">&#9664;</button>
                                                    <button class="card-move-btn"
                                                            data-id={stage.id}
                                                            data-category={stage.category}
                                                            disabled={stage.isLastCard}
                                                            onclick={handleMoveRight}
                                                            title="Move right">&#9654;</button>
                                                </div>
                                                <button class="edit-btn"
                                                        data-id={stage.id}
                                                        onclick={handleEditClick}
                                                        title="Edit SOP">
                                                </button>
                                            </div>

                                            <!-- Summary only on card -->
                                            <template if:true={stage.hasSummary}>
                                                <div class="stage-body">
                                                    <c-cc-sop-html html={stage.summary}></c-cc-sop-html>
                                                </div>
                                            </template>

                                            <!-- Linked initiatives -->
                                            <template if:true={stage.hasLinkedInitiatives}>
                                                <div class="stage-linked-bar">
                                                    <div class="stage-linked-label">&#128196; Initiatives</div>
                                                    <div class="stage-linked-items">
                                                        <template for:each={stage.linkedInitiatives} for:item="li">
                                                            <div key={li.id} class="init-link-row">
                                                                <span class={li.dotClass}></span>
                                                                <span class="init-link-name">{li.name}</span>
                                                                <span class="init-link-status">{li.status}</span>
                                                            </div>
                                                        </template>
                                                    </div>
                                                </div>
                                            </template>

                                        </div>
                                    </template>
                                </div>
                            </div>
                        </div>

                        <template if:true={group.hasConnector}>
                            <div class="funnel-connector">
                                <div class="funnel-stem"></div>
                                <div class={group.connectorArrowClass}></div>
                            </div>
                        </template>

                    </div>
                </template>
            </div>
            <!-- ── Catch-All / Unassigned Zone ────────────────── -->
            <div class={catchAllZoneClass}
                 ondragover={handleCatchAllDragOver}
                 ondragleave={handleCatchAllDragLeave}
                 ondrop={handleCatchAllDrop}>
                <div class="catchall-header">
                    <span class="catchall-title">Unassigned</span>
                    <span class="catchall-hint">Drag cards here to hold for later</span>
                </div>
                <div class="catchall-body">
                    <div class="catchall-cards">
                        <template if:true={hasCatchAll}>
                            <template for:each={catchAllStages} for:item="stage">
                                <div key={stage.id}
                                     class="stage-column"
                                     draggable="true"
                                     data-id={stage.id}
                                     data-category={stage.category}
                                     onclick={handleCardClick}
                                     ondragstart={handleDragStart}
                                     ondragend={handleDragEnd}
                                     ondragover={handleSopDragOver}
                                     ondragleave={handleSopDragLeave}
                                     ondrop={handleSopDrop}>
                                    <div class="stage-header">
                                        <div class="stage-title-row">
                                            <span class="stage-number stage-number-unassigned">{stage.num}</span>
                                            <span class="stage-name">{stage.title}</span>
                                        </div>
                                        <div class="card-reorder-btns">
                                            <button class="card-move-btn"
                                                    data-id={stage.id}
                                                    data-category="__catchall__"
                                                    disabled={stage.isFirstCard}
                                                    onclick={handleMoveLeft}
                                                    title="Move left">&#9664;</button>
                                            <button class="card-move-btn"
                                                    data-id={stage.id}
                                                    data-category="__catchall__"
                                                    disabled={stage.isLastCard}
                                                    onclick={handleMoveRight}
                                                    title="Move right">&#9654;</button>
                                        </div>
                                        <button class="edit-btn"
                                                data-id={stage.id}
                                                onclick={handleEditClick}
                                                title="Edit SOP">
                                        </button>
                                    </div>
                                    <template if:true={stage.hasSummary}>
                                        <div class="stage-body">
                                            <c-cc-sop-html html={stage.summary}></c-cc-sop-html>
                                        </div>
                                    </template>
                                    <template if:true={stage.hasLinkedInitiatives}>
                                        <div class="stage-linked-bar">
                                            <template for:each={stage.linkedInitiatives} for:item="li">
                                                <span key={li.id} class={li.badgeClass}>{li.name}</span>
                                            </template>
                                        </div>
                                    </template>
                                </div>
                            </template>
                        </template>
                        <template if:false={hasCatchAll}>
                            <div class="catchall-empty">Drop SOP cards here</div>
                        </template>
                    </div>
                </div>
            </div>
        </div>

        <!-- ── Right: Initiatives Panel ──────────────────────── -->
        <div class="initiatives-panel">
            <div class="panel-header">
                <span class="panel-title">Initiatives</span>
                <span class="panel-count">{initiativeCount}</span>
            </div>

            <!-- Status filter bar -->
            <div class="filter-bar">
                <template for:each={initiativeFilters} for:item="f">
                    <button key={f.value}
                            class={f.btnClass}
                            data-filter={f.value}
                            onclick={handleFilterClick}>{f.label}</button>
                </template>
            </div>

            <div class="panel-body">
                <template if:true={hasInitiatives}>
                    <template for:each={processedInitiatives} for:item="initiative">
                        <div key={initiative.id}
                             class="initiative-card"
                             draggable="true"
                             data-id={initiative.id}
                             ondragstart={handleInitiativeDragStart}
                             ondragend={handleInitiativeDragEnd}>
                            <div class="initiative-top">
                                <button class="initiative-name-link"
                                        data-id={initiative.id}
                                        onclick={handleInitiativeClick}>{initiative.name}</button>
                                <template if:true={initiative.status}>
                                    <span class={initiative.statusBadgeClass}>{initiative.status}</span>
                                </template>
                            </div>
                            <template if:true={initiative.meta}>
                                <div class="initiative-meta">{initiative.meta}</div>
                            </template>

                            <template if:true={initiative.hasActionItems}>
                                <div class="ai-list">
                                    <template for:each={initiative.actionItems} for:item="ai">
                                        <div key={ai.rowId} class="ai-row">
                                            <span class={ai.dotClass}></span>
                                            <span class={ai.nameClass}>{ai.name}</span>
                                            <template if:true={ai.priority}>
                                                <span class="ai-priority">{ai.priority}</span>
                                            </template>
                                        </div>
                                    </template>
                                </div>
                            </template>
                            <template if:false={initiative.hasActionItems}>
                                <div class="ai-empty">No action items</div>
                            </template>
                        </div>
                    </template>
                </template>

                <template if:false={hasInitiatives}>
                    <div class="panel-empty">
                        <p>No initiatives found.</p>
                    </div>
                </template>
            </div>
        </div>

    </div>

    <!-- ── View Modal ─────────────────────────────────────────── -->
    <template if:true={showViewModal}>
        <div class="modal-overlay" onclick={handleViewModalClose}>
            <div class="modal-container modal-container-dark" onclick={handleModalBodyClick}>
                <div class="modal-header">
                    <div class="modal-header-left">
                        <span class="modal-title">{viewStage.title}</span>
                        <template if:true={viewStage.status}>
                            <span class="modal-status-badge">{viewStage.status}</span>
                        </template>
                        <template if:true={viewStage.category}>
                            <span class="modal-category-badge">{viewStage.category}</span>
                        </template>
                    </div>
                    <button class="modal-close-btn" onclick={handleViewModalClose}>&times;</button>
                </div>
                <div class="modal-body modal-body-dark">
                    <template if:true={viewStage.hasBody}>
                        <div class="modal-section">
                            <div class="modal-section-label">Body</div>
                            <c-cc-sop-html html={viewStage.body}></c-cc-sop-html>
                        </div>
                    </template>
                    <template if:true={viewStage.hasSummary}>
                        <div class="modal-section">
                            <div class="modal-section-label">Summary</div>
                            <c-cc-sop-html html={viewStage.summary}></c-cc-sop-html>
                        </div>
                    </template>
                </div>
            </div>
        </div>
    </template>

    <!-- ── Add SOP Modal ────────────────────────────────────────── -->
    <template if:true={showAddModal}>
        <div class="modal-overlay" onclick={handleAddModalClose}>
            <div class="modal-container" onclick={handleModalBodyClick}>
                <div class="modal-header">
                    <span class="modal-title">Add SOP &mdash; {addSopLabel}</span>
                    <button class="modal-close-btn" onclick={handleAddModalClose}>&times;</button>
                </div>
                <div class="modal-body">
                    <lightning-record-edit-form
                        object-api-name="SOP__c"
                        onsuccess={handleAddSuccess}>
                        <lightning-messages></lightning-messages>
                        <lightning-input-field field-name="Name"></lightning-input-field>
                        <lightning-input-field field-name="Category__c" value={addSopCategory}></lightning-input-field>
                        <lightning-input-field field-name="Status__c"></lightning-input-field>
                        <lightning-input-field field-name="Body__c"></lightning-input-field>
                        <lightning-input-field field-name="Summary__c"></lightning-input-field>
                        <div class="form-footer">
                            <lightning-button label="Cancel" onclick={handleAddModalClose}></lightning-button>
                            <lightning-button variant="brand" type="submit" label="Save SOP"></lightning-button>
                        </div>
                    </lightning-record-edit-form>
                </div>
            </div>
        </div>
    </template>

    <!-- ── Edit Modal ─────────────────────────────────────────── -->
    <template if:true={showEditModal}>
        <div class="modal-overlay" onclick={handleOverlayClick}>
            <div class="modal-container" onclick={handleModalBodyClick}>
                <div class="modal-header">
                    <span class="modal-title">Edit SOP</span>
                    <button class="modal-close-btn" onclick={handleModalClose}>&times;</button>
                </div>
                <div class="modal-body">
                    <lightning-record-form
                        record-id={editSopId}
                        object-api-name="SOP__c"
                        fields={sopFields}
                        mode="edit"
                        onsuccess={handleSaveSuccess}
                        oncancel={handleModalClose}>
                    </lightning-record-form>
                </div>
            </div>
        </div>
    </template>

</template>
