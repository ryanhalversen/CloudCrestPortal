<!-- epicManagementPanel.html -->
<template>
    <div class={stripClass}>

        <!-- Always visible: label + view toggle -->
        <span class="epic-strip-label">Epics</span>
        <div class="view-toggle">
            <button class={chipsToggleClass}    data-view="chips"    onclick={handleToggleView}>Chips</button>
            <button class={timelineToggleClass} data-view="timeline" onclick={handleToggleView}>Timeline</button>
        </div>

        <!-- Chips mode: All Stories chip + epic chips -->
        <template if:true={isChipsView}>

            <div class={allChipClass} onclick={handleAllEpics} title="Show all stories">
                <span class="chip-label">All Stories</span>
            </div>

            <template for:each={decoratedEpics} for:item="e">
                <div key={e.epicId}
                     class={e.chipClass}
                     data-id={e.epicId}
                     onclick={handleEpicClick}
                     title={e.name}>

                    <a class="chip-record"
                       href={e.recordUrl}
                       target="_blank"
                       onclick={handleRecordClick}
                       title="Open record">↗</a>

                    <button class="chip-edit"
                            data-id={e.epicId}
                            onclick={handleEditClick}
                            title="Edit epic">✎</button>

                    <div class="chip-name">{e.name}</div>

                    <template if:true={e.dateRange}>
                        <div class="chip-dates">{e.dateRange}</div>
                    </template>

                    <div class="chip-progress-track">
                        <div class="chip-progress-fill" style={e.progressStyle}></div>
                    </div>
                    <div class="chip-meta">{e.progressLabel}<template if:true={e.estLabel}> · {e.estLabel}</template></div>
                </div>
            </template>

        </template>

        <!-- New Epic button: always visible when projectId is set -->
        <template if:true={projectId}>
            <button class="chip-add" onclick={handleNewClick}>+ New Epic</button>
        </template>

    </div>

    <!-- ── Timeline ── -->
    <template if:true={isTimelineView}>
        <div class="tl-container"
             onpointerdown={handleContainerPointerDown}
             onpointermove={handleContainerPointerMove}
             onpointerup={handleContainerPointerUp}>

            <!-- Today line -->
            <div class="tl-today" style={todayLineStyle}></div>

            <!-- Date axis header -->
            <div class="tl-header-row">
                <div class="tl-label-col"></div>
                <div class="tl-axis">
                    <template for:each={timelineDateHeaders} for:item="h">
                        <div key={h.label} class="tl-month-label" style={h.style}>{h.label}</div>
                        <div key={h.dividerKey} class="tl-month-divider" style={h.dividerStyle}></div>
                    </template>
                </div>
            </div>

            <!-- Epic rows -->
            <template for:each={timelineEpics} for:item="ep">
                <div key={ep.epicId} class="tl-row">

                    <div class="tl-label-col">
                        <span class="tl-epic-name" title={ep.name}>{ep.name}</span>
                    </div>

                    <div class="tl-track">

                        <!-- Epic bar (only when start + end dates are set) -->
                        <template if:true={ep.hasBar}>
                            <div class="tl-bar"
                                 style={ep.barStyle}
                                 data-id={ep.epicId}
                                 onclick={handleBarClick}
                                 onpointerdown={handleBarPointerDown}
                                 onpointermove={handleBarPointerMove}
                                 onpointerup={handleBarPointerUp}>
                                <div class="tl-bar-handle tl-bar-left"  data-type="left"  data-id={ep.epicId}></div>
                                <div class="tl-bar-handle tl-bar-right" data-type="right" data-id={ep.epicId}></div>
                            </div>
                        </template>

                        <!-- Milestone diamonds -->
                        <template for:each={ep.milestones} for:item="m">
                            <div key={m.feedItemId}
                                 class="tl-milestone"
                                 style={m.dotStyle}
                                 data-epic-id={ep.epicId}
                                 data-id={m.feedItemId}
                                 onpointerdown={handleMilestonePointerDown}
                                 onpointermove={handleMilestonePointerMove}
                                 onpointerup={handleMilestonePointerUp}
                                 onmouseenter={handleMilestoneMouseEnter}
                                 onmouseleave={handleMilestoneMouseLeave}>
                                ◆
                                <span class="tl-milestone-name">{m.label}</span>
                                <span class="tl-milestone-date">{m.dateLabel}</span>
                            </div>
                        </template>

                        <!-- Add milestone button -->
                        <button class="tl-add-ms"
                                data-id={ep.epicId}
                                onclick={handleAddMilestone}
                                title="Add milestone">+</button>

                    </div>
                </div>
            </template>

        </div>

        <!-- Hover card (position:fixed, shown on diamond mouseenter) -->
        <template if:true={_hoverMilestone}>
            <div class="tl-ms-hover-card"
                 style={hoverCardStyle}
                 onmouseenter={handleHoverCardMouseEnter}
                 onmouseleave={handleHoverCardMouseLeave}>
                <div class="tl-ms-hover-title">{_hoverMilestone.label}</div>
                <div class="tl-ms-hover-date">{_hoverMilestone.dateLabel}</div>
                <template if:true={_hoverMilestone.description}>
                    <div class="tl-ms-hover-desc">{_hoverMilestone.description}</div>
                </template>
                <template if:true={_hoverMilestone.changedBy}>
                    <div class="tl-ms-hover-meta">{_hoverMilestone.changedBy} · {_hoverMilestone.changedDate}</div>
                </template>
                <div class="tl-ms-hover-hint">Click to edit · Drag to move</div>
            </div>
        </template>

        <!-- Milestone inline editor (position:fixed, positioned via JS) -->
        <template if:true={_editingMilestone}>
            <div class="ms-editor" style={milestoneEditorStyle}>
                <input class="ms-input"
                       type="text"
                       value={_editingMilestone.label}
                       oninput={handleMilestoneLabelChange}
                       placeholder="Label…" />
                <input class="ms-input"
                       type="date"
                       value={_editingMilestone.date}
                       onchange={handleMilestoneDateChange} />
                <textarea class="ms-input ms-textarea"
                          oninput={handleMilestoneDescChange}
                          placeholder="Description (optional)…"
                          rows="3">{_editingMilestone.description}</textarea>
                <div class="ms-editor-actions">
                    <button class="btn-save"   onclick={handleMilestoneSave}>Save</button>
                    <template if:true={_editingMilestone.feedItemId}>
                        <button class="btn-delete" onclick={handleMilestoneDelete}>Delete</button>
                    </template>
                    <button class="btn-cancel" onclick={handleMilestoneCancel}>Cancel</button>
                </div>
            </div>
        </template>
    </template>

    <!-- ── Create / Edit Modal ── -->
    <template if:true={showModal}>
        <div class="epic-modal-backdrop" onclick={handleBackdropClick}>
            <div class="epic-modal" onclick={handleModalContainerClick}>

                <div class="epic-modal-header">
                    <h3 class="epic-modal-title">{modalTitle}</h3>
                    <button class="epic-modal-close" onclick={handleModalClose}>✕</button>
                </div>

                <div class="epic-modal-body">

                    <div class="epic-field">
                        <label class="epic-label">Name <span class="epic-required">*</span></label>
                        <input type="text"
                               class="epic-input"
                               value={modalName}
                               oninput={handleNameChange}
                               placeholder="Epic name…"
                               maxlength="80" />
                    </div>

                    <div class="epic-field-row">
                        <div class="epic-field">
                            <label class="epic-label">Start Date</label>
                            <input type="date"
                                   class="epic-input"
                                   value={modalStart}
                                   onchange={handleStartChange} />
                        </div>
                        <div class="epic-field">
                            <label class="epic-label">End Date</label>
                            <input type="date"
                                   class="epic-input"
                                   value={modalEnd}
                                   onchange={handleEndChange} />
                        </div>
                    </div>

                    <div class="epic-field">
                        <label class="epic-label">Estimated Hours</label>
                        <input type="number"
                               class="epic-input"
                               value={modalEstHours}
                               oninput={handleEstHoursChange}
                               min="0"
                               step="1"
                               placeholder="0" />
                    </div>

                    <div class="epic-field">
                        <label class="epic-label">Description</label>
                        <textarea class="epic-textarea epic-desc-textarea"
                                  oninput={handleDescChange}
                                  placeholder="Optional description…"
                                  rows="3"></textarea>
                    </div>

                    <template if:true={modalError}>
                        <div class="epic-error">{modalError}</div>
                    </template>

                </div>

                <div class="epic-modal-footer">
                    <button class="btn-cancel" onclick={handleModalClose} disabled={isSaving}>Cancel</button>
                    <button class="btn-save" onclick={handleModalSave} disabled={isSaving}>
                        <template if:true={isSaving}>Saving…</template>
                        <template if:false={isSaving}>{saveLabel}</template>
                    </button>
                </div>

            </div>
        </div>
    </template>

</template>
