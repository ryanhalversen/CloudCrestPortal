<!-- teamCapacity.html -->
<template>
<lightning-card title="Team Capacity" icon-name="standard:groups">

    <!-- Loading -->
    <template if:true={isLoading}>
        <div class="slds-p-around_large slds-text-align_center">
            <lightning-spinner alternative-text="Loading" size="medium"></lightning-spinner>
        </div>
    </template>

    <!-- Error -->
    <template if:true={error}>
        <div class="slds-p-around_medium slds-text-color_error">{error}</div>
    </template>

    <template if:false={isLoading}>
    <template if:false={error}>

        <!-- ── PERSON CAPACITY CARDS ───────────────────────────────────── -->
        <div class="slds-p-horizontal_medium slds-m-bottom_medium">
            <template if:true={companySummary}>
                <div class="company-summary">
                    <div class="cs-stats">
                        <div class="cs-stat">
                            <span class="cs-val">{companySummary.totalDemand}h</span>
                            <span class="cs-lbl">Total weekly demand</span>
                        </div>
                        <div class="cs-divider"></div>
                        <div class="cs-capacity-group">
                            <div class="cs-group-label">Internal</div>
                            <div class="cs-stat">
                                <span class="cs-val">{companySummary.fteCapacity}h</span>
                                <span class="cs-lbl">FTE capacity</span>
                            </div>
                        </div>
                        <template if:true={companySummary.hasContractors}>
                        <div class="cs-capacity-group cs-capacity-group-ext">
                            <div class="cs-group-label cs-group-label-ext">External</div>
                            <div class="cs-stat">
                                <span class="cs-val">{companySummary.contractorCapacity}h</span>
                                <span class="cs-lbl">Contractor capacity</span>
                            </div>
                        </div>
                        </template>
                        <div class="cs-divider"></div>
                        <div class="cs-stat">
                            <span class="cs-val">{companySummary.utilizationLabel}</span>
                            <span class="cs-lbl">Utilization</span>
                        </div>
                    </div>
                    <div class="util-track">
                        <div class={companySummary.barClass} style={companySummary.barStyle}></div>
                    </div>
                </div>
            </template>
            <!-- ── Tab navigation ──────────────────────────────────── -->
            <div class="cap-tab-nav">
                <button class={totalTabClass} data-tab="total" onclick={handleTabClick}>
                    Total Capacity
                    <span class="cap-tab-count">{totalPeopleCount}</span>
                </button>
                <button class={internalTabClass} data-tab="internal" onclick={handleTabClick}>
                    Internal Team
                    <span class="cap-tab-count">{personCardCount}</span>
                </button>
                <button class={contractorsTabClass} data-tab="contractors" onclick={handleTabClick}>
                    Contractors
                    <span class="cap-tab-count cap-tab-count-ext">{contractorCardCount}</span>
                </button>
            </div>

            <!-- ── Total Capacity tab ──────────────────────────────── -->
            <template if:true={isTotalTab}>
                <template if:true={totalSummary}>
                    <div class="tab-card tab-card-total">
                        <div class="tc-stats">
                            <div class="tc-stat">
                                <div class="tc-val">{totalSummary.totalCapacity}h</div>
                                <div class="tc-lbl">Total capacity / wk</div>
                            </div>
                            <div class="tc-divider"></div>
                            <div class="tc-stat">
                                <div class="tc-val">{totalSummary.demand}h</div>
                                <div class="tc-lbl">FTE demand</div>
                            </div>
                            <div class="tc-divider"></div>
                            <div class="tc-stat">
                                <div class="tc-val">{totalSummary.available}h</div>
                                <div class="tc-lbl">Available</div>
                            </div>
                            <div class="tc-divider"></div>
                            <div class="tc-stat">
                                <div class="tc-val">{totalSummary.utilizationLabel}</div>
                                <div class="tc-lbl">Utilization</div>
                            </div>
                            <div class="tc-divider"></div>
                            <div class="tc-stat">
                                <div class="tc-val">{totalSummary.totalPeople}</div>
                                <div class="tc-lbl">Total people</div>
                            </div>
                        </div>
                        <div class="util-track" style="margin-top:12px">
                            <div class={totalSummary.barClass} style={totalSummary.barStyle}></div>
                        </div>
                    </div>
                </template>
                <!-- FTEs first, then contractors -->
                <div class="person-row">
                    <template for:each={personCards} for:item="p">
                        <div key={p.id} class={p.cardClass} data-id={p.id} onclick={handlePersonClick}>
                            <div class="person-header">
                                <div class="person-avatar">{p.initials}</div>
                                <div class="person-info">
                                    <div class="person-name">{p.name}</div>
                                    <div class="person-meta">{p.role} &middot; {p.weeklyTarget}h/wk target</div>
                                </div>
                                <div class={p.statusClass}>{p.statusLabel}</div>
                            </div>
                            <div class="cap-stats">
                                <div class="cap-stat">
                                    <div class="cap-stat-val">{p.logged}h</div>
                                    <div class="cap-stat-lbl">Logged this week</div>
                                </div>
                                <div class="cap-stat-divider"></div>
                                <div class="cap-stat">
                                    <div class="cap-stat-val">{p.demand}h</div>
                                    <div class="cap-stat-lbl">Weekly demand</div>
                                </div>
                                <template if:true={p.available}>
                                <div class="cap-stat-divider"></div>
                                <div class="cap-stat">
                                    <div class="cap-stat-val">{p.available}h</div>
                                    <div class="cap-stat-lbl">Available</div>
                                </div>
                                </template>
                                <div class="cap-stat-divider"></div>
                                <div class="cap-stat">
                                    <div class="cap-stat-val">{p.projectCount}</div>
                                    <div class="cap-stat-lbl">Projects</div>
                                </div>
                            </div>
                            <div class="cap-bars">
                                <div class="cap-bar-row">
                                    <span class="cap-bar-lbl">Logged</span>
                                    <div class="cap-track">
                                        <div class="cap-fill cap-fill-logged" style={p.logBarStyle}></div>
                                    </div>
                                    <span class="cap-bar-pct">{p.logPct}%</span>
                                </div>
                                <div class="cap-bar-row">
                                    <span class="cap-bar-lbl">Demand</span>
                                    <div class="cap-track">
                                        <div class="cap-fill cap-fill-demand" style={p.demandBarStyle}></div>
                                    </div>
                                    <span class="cap-bar-pct">{p.demandPct}%</span>
                                </div>
                            </div>
                        </div>
                    </template>
                    <template for:each={contractorCards} for:item="c">
                        <div key={c.id} class="person-card" data-id={c.id} onclick={handlePersonClick}>
                            <div class="person-header">
                                <div class="person-avatar contractor-avatar">{c.initials}</div>
                                <div class="person-info">
                                    <div class="person-name">{c.name}</div>
                                    <div class="person-meta">Contractor &middot; {c.weeklyHours}h/wk available</div>
                                </div>
                                <div class="cap-status cap-contractor">Contractor</div>
                            </div>
                            <div class="cap-stats">
                                <div class="cap-stat">
                                    <div class="cap-stat-val">{c.weeklyHours}h</div>
                                    <div class="cap-stat-lbl">Available / week</div>
                                </div>
                            </div>
                        </div>
                    </template>
                </div>
            </template>

            <!-- ── Internal Team tab ───────────────────────────────── -->
            <template if:true={isInternalTab}>
                <template if:true={internalSummary}>
                    <div class="tab-card">
                        <div class="tc-stats">
                            <div class="tc-stat">
                                <div class="tc-val">{internalSummary.capacity}h</div>
                                <div class="tc-lbl">FTE capacity / wk</div>
                            </div>
                            <div class="tc-divider"></div>
                            <div class="tc-stat">
                                <div class="tc-val">{internalSummary.demand}h</div>
                                <div class="tc-lbl">Total demand</div>
                            </div>
                            <div class="tc-divider"></div>
                            <div class="tc-stat">
                                <div class="tc-val">{internalSummary.utilizationLabel}</div>
                                <div class="tc-lbl">FTE utilization</div>
                            </div>
                            <div class="tc-divider"></div>
                            <div class="tc-stat">
                                <div class="tc-val">{internalSummary.memberCount}</div>
                                <div class="tc-lbl">Team members</div>
                            </div>
                            <div class="tc-divider"></div>
                            <div class="tc-stat">
                                <div class="tc-val">{internalSummary.atCapCount}</div>
                                <div class="tc-lbl">At capacity</div>
                            </div>
                        </div>
                        <div class="util-track" style="margin-top:12px">
                            <div class={internalSummary.barClass} style={internalSummary.barStyle}></div>
                        </div>
                    </div>
                </template>
                <div class="person-row">
                    <template for:each={personCards} for:item="p">
                        <div key={p.id} class={p.cardClass} data-id={p.id} onclick={handlePersonClick}>
                            <div class="person-header">
                                <div class="person-avatar">{p.initials}</div>
                                <div class="person-info">
                                    <div class="person-name">{p.name}</div>
                                    <div class="person-meta">{p.role} &middot; {p.weeklyTarget}h/wk target</div>
                                </div>
                                <div class={p.statusClass}>{p.statusLabel}</div>
                            </div>
                            <div class="cap-stats">
                                <div class="cap-stat">
                                    <div class="cap-stat-val">{p.logged}h</div>
                                    <div class="cap-stat-lbl">Logged this week</div>
                                </div>
                                <div class="cap-stat-divider"></div>
                                <div class="cap-stat">
                                    <div class="cap-stat-val">{p.demand}h</div>
                                    <div class="cap-stat-lbl">Weekly demand</div>
                                </div>
                                <template if:true={p.available}>
                                <div class="cap-stat-divider"></div>
                                <div class="cap-stat">
                                    <div class="cap-stat-val">{p.available}h</div>
                                    <div class="cap-stat-lbl">Available</div>
                                </div>
                                </template>
                                <div class="cap-stat-divider"></div>
                                <div class="cap-stat">
                                    <div class="cap-stat-val">{p.projectCount}</div>
                                    <div class="cap-stat-lbl">Projects</div>
                                </div>
                            </div>
                            <div class="cap-bars">
                                <div class="cap-bar-row">
                                    <span class="cap-bar-lbl">Logged</span>
                                    <div class="cap-track">
                                        <div class="cap-fill cap-fill-logged" style={p.logBarStyle}></div>
                                    </div>
                                    <span class="cap-bar-pct">{p.logPct}%</span>
                                </div>
                                <div class="cap-bar-row">
                                    <span class="cap-bar-lbl">Demand</span>
                                    <div class="cap-track">
                                        <div class="cap-fill cap-fill-demand" style={p.demandBarStyle}></div>
                                    </div>
                                    <span class="cap-bar-pct">{p.demandPct}%</span>
                                </div>
                            </div>
                        </div>
                    </template>
                </div>
            </template>

            <!-- ── Contractors tab ─────────────────────────────────── -->
            <template if:true={isContractorsTab}>
                <div class="tab-card tab-card-contractor">
                    <div class="tc-stats">
                        <div class="tc-stat">
                            <div class="tc-val">{contractorSummary.totalHours}h</div>
                            <div class="tc-lbl">Available / week</div>
                        </div>
                        <div class="tc-divider"></div>
                        <div class="tc-stat">
                            <div class="tc-val">{contractorSummary.count}</div>
                            <div class="tc-lbl">Contractors</div>
                        </div>
                    </div>
                </div>
                <template if:true={hasContractors}>
                    <div class="person-row">
                        <template for:each={contractorCards} for:item="c">
                            <div key={c.id} class="person-card" data-id={c.id} onclick={handlePersonClick}>
                                <div class="person-header">
                                    <div class="person-avatar contractor-avatar">{c.initials}</div>
                                    <div class="person-info">
                                        <div class="person-name">{c.name}</div>
                                        <div class="person-meta">Contractor &middot; {c.weeklyHours}h/wk available</div>
                                    </div>
                                    <div class="cap-status cap-contractor">Contractor</div>
                                </div>
                                <div class="cap-stats">
                                    <div class="cap-stat">
                                        <div class="cap-stat-val">{c.weeklyHours}h</div>
                                        <div class="cap-stat-lbl">Available / week</div>
                                    </div>
                                </div>
                            </div>
                        </template>
                    </div>
                </template>
                <template if:false={hasContractors}>
                    <div class="empty-state">No contractors found. Add contacts to the &apos;CloudCrest Contractors&apos; account with Available Hours set.</div>
                </template>
            </template>
        </div>

        <!-- ── Billing History Panel ─────────────────────────────────── -->
        <div class="slds-p-horizontal_medium">
            <template if:true={showBillingPanel}>
                <div class="bh-panel">
                    <!-- Header -->
                    <div class="bh-header">
                        <span class="bh-title">{billingPersonName} — Billing History</span>
                        <div class="bh-controls">
                            <!-- View toggle -->
                            <template if:false={isContractorSelected}>
                                <div class="bh-view-group">
                                    <button class={billingViewWeekClass}  data-view="week"  onclick={handleBillingView}>Week</button>
                                    <button class={billingViewMonthClass} data-view="month" onclick={handleBillingView}>Month</button>
                                </div>
                                <!-- Range selector -->
                                <template if:true={billingIsWeekView}>
                                    <div class="bh-range-group">
                                        <button class={bhRange1Class} data-weeks="4"  onclick={handleBillingRange}>4 wks</button>
                                        <button class={bhRange2Class} data-weeks="8"  onclick={handleBillingRange}>8 wks</button>
                                        <button class={bhRange3Class} data-weeks="12" onclick={handleBillingRange}>12 wks</button>
                                    </div>
                                </template>
                                <template if:true={billingIsMonthView}>
                                    <div class="bh-range-group">
                                        <button class={bhRange1Class} data-weeks="13" onclick={handleBillingRange}>3 mo</button>
                                        <button class={bhRange2Class} data-weeks="26" onclick={handleBillingRange}>6 mo</button>
                                        <button class={bhRange3Class} data-weeks="52" onclick={handleBillingRange}>12 mo</button>
                                    </div>
                                </template>
                            </template>
                        </div>
                    </div>

                    <!-- Contractor empty state -->
                    <template if:true={isContractorSelected}>
                        <div class="bh-empty">No billing history — contractors log time externally.</div>
                    </template>

                    <!-- FTE history table -->
                    <template if:false={isContractorSelected}>
                        <template if:true={billingRows.isEmpty}>
                            <div class="bh-empty">No time entries found for this period.</div>
                        </template>
                        <template if:false={billingRows.isEmpty}>
                            <div class="bh-table-wrap">
                                <table class="bh-table">
                                    <thead>
                                        <tr>
                                            <th class="bh-th-period">Period</th>
                                            <th class="bh-th-total">Total</th>
                                            <template for:each={billingRows.projectCols} for:item="col">
                                                <th key={col} class="bh-th-proj">{col}</th>
                                            </template>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <template for:each={billingRows.rows} for:item="row">
                                            <tr key={row.label} class="bh-row">
                                                <td class="bh-td-period">{row.label}</td>
                                                <td class="bh-td-total">{row.totalHours}h</td>
                                                <template for:each={row.cells} for:item="cell">
                                                    <td key={cell.key} class="bh-td-proj">
                                                        <template if:true={cell.hours}>{cell.hours}h</template>
                                                        <template if:false={cell.hours}><span class="bh-zero">—</span></template>
                                                    </td>
                                                </template>
                                            </tr>
                                        </template>
                                        <!-- Average row -->
                                        <tr class="bh-row bh-row-avg">
                                            <td class="bh-td-period">Avg / period</td>
                                            <td class="bh-td-total">{billingRows.avgTotalHours}h</td>
                                            <template for:each={billingRows.avgCells} for:item="cell">
                                                <td key={cell.key} class="bh-td-proj">
                                                    <template if:true={cell.hours}>{cell.hours}h</template>
                                                    <template if:false={cell.hours}><span class="bh-zero">—</span></template>
                                                </td>
                                            </template>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </template>
                    </template>
                </div>
            </template>
        </div>

        <!-- ── PROJECT TABLE ───────────────────────────────────────────── -->
        <div class="slds-p-horizontal_medium">

            <!-- Table header row -->
            <div class="table-header-row">
                <span class="table-title">{filterLabel}</span>
                <template if:true={_selectedId}>
                    <button class="clear-filter-btn" onclick={handleClearFilter}>✕ Show all</button>
                </template>
            </div>

            <!-- Table -->
            <template if:true={hasProjects}>
            <div class="table-wrap">
                <table class="cap-table">
                    <thead>
                        <tr>
                            <th>Project</th>
                            <th>Client</th>
                            <th>Owner</th>
                            <th>Support</th>
                            <th>On Time Weekly</th>
                            <th>Progress</th>
                            <th>Remaining</th>
                            <th>End Date</th>
                            <th>Weeks Left</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody>
                        <template for:each={projectRows} for:item="p">
                            <tr key={p.id} class="cap-row" data-id={p.id} onclick={handleProjectClick}>
                                <td class="col-project">{p.name}</td>
                                <td class="col-client">{p.clientName}</td>
                                <td class="col-owner">{p.ownerName}</td>
                                <td class="col-support">
                                    <template if:true={p.supportLeadName}>{p.supportLeadName}</template>
                                    <template if:false={p.supportLeadName}><span class="muted">—</span></template>
                                </td>
                                <td class="col-pace">{p.weeklyPace}</td>
                                <td class="col-progress">
                                    <div class="prog-track">
                                        <div class={p.progressClass} style={p.progressStyle}></div>
                                    </div>
                                    <span class="prog-label">{p.hoursDelivered}h / {p.contractedHours}h</span>
                                </td>
                                <td class="col-remaining">{p.remainingHours}h</td>
                                <td class="col-date">{p.endDate}</td>
                                <td class="col-weeks">{p.remainingWeeks}</td>
                                <td class="col-pace-status">
                                    <span class={p.paceClass}>{p.paceStatus}</span>
                                </td>
                            </tr>
                        </template>
                    </tbody>
                </table>
            </div>
            </template>

            <template if:true={showEmpty}>
                <div class="empty-state">No active projects found.</div>
            </template>

        </div>

    </template>
    </template>

</lightning-card>
</template>
