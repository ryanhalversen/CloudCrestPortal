<template>
    <div class="report-wrapper">

        <!-- ── Error ─────────────────────────────────────────── -->
        <template if:true={hasError}>
            <div class="state-error">Unable to load project report.</div>
        </template>

        <!-- ── Empty ─────────────────────────────────────────── -->
        <template if:false={hasData}>
            <template if:false={hasError}>
                <div class="state-empty">No project data found.</div>
            </template>
        </template>

        <!-- ── Report ────────────────────────────────────────── -->
        <template if:true={hasData}>

            <!-- Client pill -->
            <template if:true={project.accountName}>
                <div class="client-pill">&#128203;&nbsp;{project.accountName}</div>
            </template>

            <!-- ── KPI Row ────────────────────────────────────── -->
            <div class="kpi-row">
                <div class="kpi-card">
                    <span class="kpi-val">{project.contractedDisplay}</span>
                    <span class="kpi-lbl">Contracted</span>
                </div>
                <div class="kpi-card kpi-card-blue">
                    <span class="kpi-val kpi-val-blue">{project.deliveredDisplay}</span>
                    <span class="kpi-lbl">Delivered</span>
                </div>
                <div class="kpi-card">
                    <span class="kpi-val">{project.remainingDisplay}</span>
                    <span class="kpi-lbl">Remaining</span>
                </div>
                <div class="kpi-card kpi-card-accent">
                    <span class="kpi-val kpi-val-accent">{project.pct}%</span>
                    <span class="kpi-lbl">Complete</span>
                </div>
            </div>

            <!-- ── Date Strip ────────────────────────────────── -->
            <template if:true={project.hasDates}>
                <div class="date-strip">
                    <div class="date-block">
                        <span class="date-label">Project Start</span>
                        <span class="date-value">{project.startDateFormatted}</span>
                    </div>
                    <div class="date-arrow">&rarr;</div>
                    <div class="date-block date-block-right">
                        <span class="date-label">Target End</span>
                        <span class="date-value date-value-end">{project.endDateFormatted}</span>
                    </div>
                </div>
            </template>

            <!-- ── Progress Bar ───────────────────────────────── -->
            <div class="progress-wrap">
                <div class="progress-track">
                    <div class={project.barColorClass} style={project.barStyle}></div>
                </div>
                <span class="progress-label">{project.pct}% delivered</span>
            </div>

            <!-- ── Meta Row ───────────────────────────────────── -->
            <template if:true={project.hasMeta}>
                <div class="meta-row">
                    <template if:true={project.paceStatus}>
                        <span class={project.paceBadgeClass}>{project.paceStatus}</span>
                    </template>
                    <template if:true={project.ownerName}>
                        <span class="meta-chip">&#128100;&nbsp;{project.ownerName}</span>
                    </template>
                    <template if:true={project.contractType}>
                        <span class="meta-tag meta-tag-purple">{project.contractType}</span>
                    </template>
                    <template if:true={project.deliveryType}>
                        <span class="meta-tag meta-tag-gray">{project.deliveryType}</span>
                    </template>
                </div>
            </template>

            <!-- ── Epic Cards ─────────────────────────────────── -->
            <template if:true={project.hasEpics}>
                <div class="epics-hdr">
                    <span class="epics-hdr-title">Epics</span>
                    <span class="epics-hdr-sub">{project.epicCount}&nbsp;epics &mdash; {project.totalEpicHrsDisplay}&nbsp;total invested</span>
                </div>
                <div class="epic-cards-grid">
                    <template for:each={project.epics} for:item="epic">
                        <div key={epic.id} class="epic-card">
                            <div class="epic-card-hours">{epic.hoursDisplay}</div>
                            <div class="epic-card-name">{epic.name}</div>
                            <div class="epic-card-bar-track">
                                <div class="epic-card-bar-fill" style={epic.barStyle}></div>
                            </div>
                            <div class="epic-card-pct">{epic.pctOfTotal}% of total</div>
                        </div>
                    </template>
                </div>
            </template>

            <template if:false={project.hasEpics}>
                <div class="state-empty">No epics found for this project.</div>
            </template>

        </template>

    </div>
</template>
