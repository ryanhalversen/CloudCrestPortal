<template>
    <div class="report-wrapper">

        <!-- ── Error state ───────────────────────────────────── -->
        <template if:true={hasError}>
            <div class="state-msg state-error">Unable to load project report.</div>
        </template>

        <!-- ── No data yet ───────────────────────────────────── -->
        <template if:false={hasData}>
            <template if:false={hasError}>
                <div class="state-msg state-empty">No project data found.</div>
            </template>
        </template>

        <!-- ── Project report ────────────────────────────────── -->
        <template if:true={hasData}>

            <!-- Account / client name -->
            <template if:true={project.accountName}>
                <div class="client-label">&#128203;&nbsp;{project.accountName}</div>
            </template>

            <!-- ── KPI Bar ────────────────────────────────────── -->
            <div class="kpi-bar">
                <div class="kpi-card">
                    <div class="kpi-value">{project.contractedDisplay}</div>
                    <div class="kpi-label">Contracted</div>
                </div>
                <div class="kpi-card">
                    <div class="kpi-value kpi-value-delivered">{project.deliveredDisplay}</div>
                    <div class="kpi-label">Delivered</div>
                </div>
                <div class="kpi-card">
                    <div class="kpi-value">{project.remainingDisplay}</div>
                    <div class="kpi-label">Remaining</div>
                </div>
                <div class="kpi-card kpi-card-pct">
                    <div class="kpi-value kpi-value-pct">{project.pct}%</div>
                    <div class="kpi-label">Complete</div>
                </div>
            </div>

            <!-- ── Progress Bar ───────────────────────────────── -->
            <div class="progress-section">
                <div class="progress-bar-wrap">
                    <div class="progress-bar-fill" style={project.barStyle}></div>
                </div>

                <!-- Meta row: pace, owner, dates, types -->
                <template if:true={project.hasMeta}>
                    <div class="meta-row">
                        <template if:true={project.paceStatus}>
                            <span class={project.paceBadgeClass}>{project.paceStatus}</span>
                        </template>
                        <template if:true={project.ownerName}>
                            <span class="meta-item">&#128100;&nbsp;{project.ownerName}</span>
                        </template>
                        <template if:true={project.hasDates}>
                            <span class="meta-item">
                                &#128197;&nbsp;{project.startDateStr}&nbsp;&rarr;&nbsp;{project.endDateStr}
                            </span>
                        </template>
                        <template if:true={project.contractType}>
                            <span class="meta-badge meta-contract">{project.contractType}</span>
                        </template>
                        <template if:true={project.deliveryType}>
                            <span class="meta-badge meta-delivery">{project.deliveryType}</span>
                        </template>
                    </div>
                </template>
            </div>

            <!-- ── Story Sections ─────────────────────────────── -->
            <div class="story-sections">

                <!-- Delivered -->
                <template if:true={project.hasCompleted}>
                    <div class="story-section">
                        <div class="story-section-hdr hdr-complete">
                            <span class="hdr-dot dot-complete"></span>
                            <span class="hdr-title">Delivered</span>
                            <span class="hdr-count">{project.completedCount}</span>
                        </div>
                        <div class="story-list">
                            <template for:each={project.completedStories} for:item="s">
                                <div key={s.id} class="story-row">
                                    <span class="story-check">&#10003;</span>
                                    <span class="story-subject">{s.subject}</span>
                                    <template if:true={s.type}>
                                        <span class="story-type">{s.type}</span>
                                    </template>
                                </div>
                            </template>
                        </div>
                    </div>
                </template>

                <!-- In Progress -->
                <template if:true={project.hasInProgress}>
                    <div class="story-section">
                        <div class="story-section-hdr hdr-active">
                            <span class="hdr-dot dot-active"></span>
                            <span class="hdr-title">In Progress</span>
                            <span class="hdr-count">{project.inProgressCount}</span>
                        </div>
                        <div class="story-list">
                            <template for:each={project.inProgressStories} for:item="s">
                                <div key={s.id} class="story-row">
                                    <span class="story-dot dot-active"></span>
                                    <span class="story-subject">{s.subject}</span>
                                    <template if:true={s.type}>
                                        <span class="story-type">{s.type}</span>
                                    </template>
                                </div>
                            </template>
                        </div>
                    </div>
                </template>

                <!-- Blocked -->
                <template if:true={project.hasBlocked}>
                    <div class="story-section">
                        <div class="story-section-hdr hdr-blocked">
                            <span class="hdr-dot dot-blocked"></span>
                            <span class="hdr-title">Blocked</span>
                            <span class="hdr-count">{project.blockedCount}</span>
                        </div>
                        <div class="story-list">
                            <template for:each={project.blockedStories} for:item="s">
                                <div key={s.id} class="story-row">
                                    <span class="story-dot dot-blocked"></span>
                                    <span class="story-subject">{s.subject}</span>
                                    <template if:true={s.type}>
                                        <span class="story-type">{s.type}</span>
                                    </template>
                                </div>
                            </template>
                        </div>
                    </div>
                </template>

                <!-- Empty stories state -->
                <template if:false={project.hasCompleted}>
                    <template if:false={project.hasInProgress}>
                        <template if:false={project.hasBlocked}>
                            <div class="no-stories">No stories found for this project.</div>
                        </template>
                    </template>
                </template>

            </div>
        </template>

    </div>
</template>
