<template>
    <div class="report-wrapper">

        <!-- ── Error ─────────────────────────────────────────── -->
        <template if:true={hasError}>
            <div class="state-error">Unable to load project report.</div>
        </template>

        <!-- ── Empty ─────────────────────────────────────────── -->
        <template if:false={hasData}>
            <template if:false={hasError}>
                <div class="state-empty">No project data found.</div>
            </template>
        </template>

        <!-- ── Report ────────────────────────────────────────── -->
        <template if:true={hasData}>

            <!-- Client pill -->
            <template if:true={project.accountName}>
                <div class="client-pill">&#128203;&nbsp;{project.accountName}</div>
            </template>

            <!-- ── KPI Row ────────────────────────────────────── -->
            <div class="kpi-row">
                <div class="kpi-card">
                    <span class="kpi-val">{project.contractedDisplay}</span>
                    <span class="kpi-lbl">Contracted</span>
                </div>
                <div class="kpi-card kpi-card-blue">
                    <span class="kpi-val kpi-val-blue">{project.deliveredDisplay}</span>
                    <span class="kpi-lbl">Delivered</span>
                </div>
                <div class="kpi-card">
                    <span class="kpi-val">{project.remainingDisplay}</span>
                    <span class="kpi-lbl">Remaining</span>
                </div>
                <div class="kpi-card kpi-card-accent">
                    <span class="kpi-val kpi-val-accent">{project.pct}%</span>
                    <span class="kpi-lbl">Complete</span>
                </div>
            </div>

            <!-- ── Progress Bar ───────────────────────────────── -->
            <div class="progress-wrap">
                <div class="progress-track">
                    <div class={project.barColorClass} style={project.barStyle}></div>
                </div>
                <span class="progress-label">{project.pct}% delivered</span>
            </div>

            <!-- ── Meta Row ───────────────────────────────────── -->
            <template if:true={project.hasMeta}>
                <div class="meta-row">
                    <template if:true={project.paceStatus}>
                        <span class={project.paceBadgeClass}>{project.paceStatus}</span>
                    </template>
                    <template if:true={project.ownerName}>
                        <span class="meta-chip">&#128100;&nbsp;{project.ownerName}</span>
                    </template>
                    <template if:true={project.hasDates}>
                        <span class="meta-chip">
                            &#128197;&nbsp;{project.startDateStr}&nbsp;&rarr;&nbsp;{project.endDateStr}
                        </span>
                    </template>
                    <template if:true={project.contractType}>
                        <span class="meta-tag meta-tag-purple">{project.contractType}</span>
                    </template>
                    <template if:true={project.deliveryType}>
                        <span class="meta-tag meta-tag-gray">{project.deliveryType}</span>
                    </template>
                </div>
            </template>

            <!-- ── Epics ─────────────────────────────────────── -->
            <template if:true={project.hasEpics}>
                <div class="section-card">
                    <div class="section-hdr">
                        <span class="section-title">Epics</span>
                        <span class="section-sub">{project.epicCount}&nbsp;epics &mdash; {project.totalEpicHrsDisplay}&nbsp;invested</span>
                    </div>
                    <div class="epic-list">
                        <template for:each={project.epics} for:item="epic">
                            <div key={epic.id} class="epic-row">
                                <span class="epic-name">{epic.name}</span>
                                <span class="epic-hours">{epic.hoursDisplay}</span>
                                <span class="epic-pct">{epic.pctOfTotal}%</span>
                                <div class="epic-bar-track">
                                    <div class="epic-bar-fill" style={epic.barStyle}></div>
                                </div>
                            </div>
                        </template>
                    </div>
                </div>
            </template>

            <!-- ── Stories ───────────────────────────────────── -->
            <div class="story-sections">

                <!-- Delivered -->
                <template if:true={project.hasCompleted}>
                    <div class="section-card section-card-green">
                        <div class="section-hdr">
                            <span class="dot dot-green"></span>
                            <span class="section-title">Delivered</span>
                            <span class="count-pill count-pill-green">{project.completedCount}</span>
                        </div>
                        <div class="story-list">
                            <template for:each={project.completedStories} for:item="s">
                                <div key={s.id} class="story-row">
                                    <span class="check-icon">&#10003;</span>
                                    <span class="story-subject">{s.subject}</span>
                                    <template if:true={s.type}>
                                        <span class="story-tag">{s.type}</span>
                                    </template>
                                </div>
                            </template>
                        </div>
                    </div>
                </template>

                <!-- In Progress -->
                <template if:true={project.hasInProgress}>
                    <div class="section-card section-card-blue">
                        <div class="section-hdr">
                            <span class="dot dot-blue"></span>
                            <span class="section-title">In Progress</span>
                            <span class="count-pill count-pill-blue">{project.inProgressCount}</span>
                        </div>
                        <div class="story-list">
                            <template for:each={project.inProgressStories} for:item="s">
                                <div key={s.id} class="story-row">
                                    <span class="open-icon">&#9679;</span>
                                    <span class="story-subject">{s.subject}</span>
                                    <template if:true={s.type}>
                                        <span class="story-tag">{s.type}</span>
                                    </template>
                                </div>
                            </template>
                        </div>
                    </div>
                </template>

                <!-- Blocked -->
                <template if:true={project.hasBlocked}>
                    <div class="section-card section-card-red">
                        <div class="section-hdr">
                            <span class="dot dot-red"></span>
                            <span class="section-title">Blocked</span>
                            <span class="count-pill count-pill-red">{project.blockedCount}</span>
                        </div>
                        <div class="story-list">
                            <template for:each={project.blockedStories} for:item="s">
                                <div key={s.id} class="story-row">
                                    <span class="open-icon open-icon-red">&#9679;</span>
                                    <span class="story-subject">{s.subject}</span>
                                    <template if:true={s.type}>
                                        <span class="story-tag">{s.type}</span>
                                    </template>
                                </div>
                            </template>
                        </div>
                    </div>
                </template>

                <template if:false={project.hasCompleted}>
                    <template if:false={project.hasInProgress}>
                        <template if:false={project.hasBlocked}>
                            <div class="state-empty">No stories found for this project.</div>
                        </template>
                    </template>
                </template>

            </div>
        </template>

    </div>
</template>
