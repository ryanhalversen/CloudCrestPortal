<template>
    <div class="report-wrapper">

        <!-- ── Error ─────────────────────────────────────────── -->
        <template if:true={hasError}>
            <div class="state-error">Unable to load project report.</div>
        </template>

        <!-- ── Empty ─────────────────────────────────────────── -->
        <template if:false={hasData}>
            <template if:false={hasError}>
                <div class="state-empty">No project data found.</div>
            </template>
        </template>

        <!-- ── Report ────────────────────────────────────────── -->
        <template if:true={hasData}>

            <!-- ── Completed Work Highlight ───────────────────── -->
            <template if:true={project.hasHighlight}>
                <div class="highlight-section">
                    <div class="highlight-section-hdr">
                        <span class="highlight-section-icon">&#10022;</span>
                        <span class="highlight-section-title">Completed Work Highlight</span>
                    </div>
                    <div class="highlight-cards-grid">
                        <template for:each={project.highlightSections} for:item="sec">
                            <div key={sec.id} class="highlight-card">
                                <template if:true={sec.title}>
                                    <div class="highlight-card-title">{sec.title}</div>
                                </template>
                                <div class="highlight-card-items">
                                    <template for:each={sec.items} for:item="item">
                                        <div key={item.id} class="highlight-card-item">
                                            <span class="highlight-item-dot"></span>
                                            <span class="highlight-item-text">{item.text}</span>
                                        </div>
                                    </template>
                                </div>
                            </div>
                        </template>
                    </div>
                </div>
            </template>

            <!-- Client pill -->
            <template if:true={project.accountName}>
                <div class="client-pill">&#128203;&nbsp;{project.accountName}</div>
            </template>

            <!-- ── Date Strip ────────────────────────────────── -->
            <template if:true={project.hasDates}>
                <div class="date-strip">
                    <div class="date-block">
                        <span class="date-label">Project Start</span>
                        <span class="date-value">{project.startDateFormatted}</span>
                    </div>
                    <div class="date-arrow">&rarr;</div>
                    <div class="date-block">
                        <span class="date-label">Target End</span>
                        <span class="date-value date-value-end">{project.endDateFormatted}</span>
                    </div>
                    <div class="date-divider"></div>
                    <div class="date-block date-block-right">
                        <span class="date-label">On Time Hrs / Wk</span>
                        <span class="date-value date-value-green">{project.weeklyPaceDisplay}</span>
                        <template if:true={project.weeklyPaceDelta}>
                            <span class={project.weeklyPaceDelta.cssClass}>{project.weeklyPaceDelta.label}</span>
                        </template>
                    </div>
                </div>
            </template>

            <!-- ── KPI Row ────────────────────────────────────── -->
            <div class="kpi-row">
                <div class="kpi-card">
                    <span class="kpi-val">{project.contractedDisplay}</span>
                    <span class="kpi-lbl">Contracted</span>
                </div>
                <div class="kpi-card kpi-card-blue">
                    <span class="kpi-val kpi-val-blue">{project.deliveredDisplay}</span>
                    <span class="kpi-lbl">Delivered</span>
                </div>
                <div class="kpi-card">
                    <span class="kpi-val">{project.remainingDisplay}</span>
                    <span class="kpi-lbl">Remaining</span>
                </div>
                <div class="kpi-card kpi-card-accent">
                    <span class="kpi-val kpi-val-accent">{project.pct}%</span>
                    <span class="kpi-lbl">Complete</span>
                </div>
            </div>

            <!-- ── Progress Bar ───────────────────────────────── -->
            <div class="progress-wrap">
                <div class="progress-track">
                    <div class={project.barColorClass} style={project.barStyle}></div>
                </div>
                <span class="progress-label">{project.pct}% delivered</span>
            </div>

            <!-- ── Week-over-Week ─────────────────────────────── -->
            <template if:true={project.hasWeeklyData}>
                <div class="wow-section">
                    <div class="wow-hdr">
                        <span class="wow-hdr-title">Hours Delivered by Week</span>
                    </div>
                    <div class="wow-table">
                        <template for:each={project.weeklyData} for:item="week">
                            <div key={week.id} class="wow-row">
                                <span class="wow-label">{week.label}</span>
                                <div class="wow-bar-track">
                                    <div class="wow-bar-fill" style={week.barStyle}></div>
                                </div>
                                <span class="wow-hours">{week.hoursDisplay}</span>
                                <template if:true={week.hasPeople}>
                                    <div class="wow-people">
                                        <template for:each={week.people} for:item="person">
                                            <span key={person.id} class="wow-chip">{person.text}</span>
                                        </template>
                                    </div>
                                </template>
                            </div>
                        </template>
                    </div>
                </div>
            </template>

            <!-- ── Epic Cards ─────────────────────────────────── -->
            <template if:true={project.hasEpics}>
                <div class="epics-hdr">
                    <span class="epics-hdr-title">Epics</span>
                    <span class="epics-hdr-sub">{project.epicCount}&nbsp;epics &mdash; {project.totalEpicHrsDisplay}&nbsp;total invested</span>
                </div>
                <div class="epic-cards-grid">
                    <template for:each={project.epics} for:item="epic">
                        <div key={epic.id}
                             class={epic.epicCardClass}
                             data-epic-id={epic.id}
                             onclick={handleEpicClick}
                             role="button"
                             tabindex="0">
                            <div class="epic-card-hours">{epic.hoursDisplay}</div>
                            <div class="epic-card-name">{epic.name}</div>
                            <div class="epic-card-bar-track">
                                <div class="epic-card-bar-fill" style={epic.barStyle}></div>
                            </div>
                            <div class="epic-card-footer">
                                <span class="epic-card-pct">{epic.pctOfTotal}% of total</span>
                                <span class="epic-card-expand">&#8964;</span>
                            </div>
                        </div>
                    </template>
                </div>

                <!-- Expanded epic stories panel -->
                <template if:true={project.hasSelectedEpic}>
                    <div class="epic-panel">
                        <div class="epic-panel-hdr">
                            <span class="epic-panel-name">{project.selectedEpic.name}</span>
                            <span class="epic-panel-hrs">{project.selectedEpic.hoursDisplay} invested</span>
                        </div>
                        <template if:true={project.selectedEpic.hasStories}>
                            <div class="epic-panel-stories">
                                <template for:each={project.selectedEpic.stories} for:item="story">
                                    <div key={story.id} class="epic-panel-row">
                                        <span class="epic-panel-story-name">{story.subject}</span>
                                        <span class="epic-panel-story-hrs">{story.hoursDisplay}</span>
                                    </div>
                                </template>
                            </div>
                        </template>
                        <template if:false={project.selectedEpic.hasStories}>
                            <div class="state-empty">No time logged against stories in this epic.</div>
                        </template>
                    </div>
                </template>
            </template>

            <template if:false={project.hasEpics}>
                <div class="state-empty">No epics found for this project.</div>
            </template>

            <!-- ── Story Breakdown ───────────────────────────── -->
            <template if:true={project.hasStories}>

                <!-- By Status (full width) -->
                <div class="breakdown-card">
                    <div class="breakdown-hdr">
                        <span class="breakdown-title">By Status</span>
                        <span class="breakdown-total">{project.totalStoryCount} stories</span>
                    </div>
                    <div class="breakdown-list breakdown-list-status">
                        <template for:each={project.statusBreakdown} for:item="row">
                            <div key={row.id} class="breakdown-row">
                                <span class="breakdown-name">{row.name}</span>
                                <div class="breakdown-bar-track">
                                    <div class="breakdown-bar-fill breakdown-bar-blue" style={row.barStyle}></div>
                                </div>
                                <span class="breakdown-count">{row.count}</span>
                            </div>
                        </template>
                    </div>
                </div>

                <div class="breakdown-grid">

                    <!-- By Type -->
                    <div class="breakdown-card">
                        <div class="breakdown-hdr">
                            <span class="breakdown-title">By Type</span>
                            <span class="breakdown-total">{project.totalStoryCount} stories</span>
                        </div>
                        <div class="breakdown-list">
                            <template for:each={project.typeBreakdown} for:item="row">
                                <div key={row.id} class="breakdown-row">
                                    <span class="breakdown-name">{row.name}</span>
                                    <div class="breakdown-bar-track">
                                        <div class="breakdown-bar-fill breakdown-bar-blue" style={row.barStyle}></div>
                                    </div>
                                    <span class="breakdown-count">{row.count}</span>
                                </div>
                            </template>
                        </div>
                    </div>

                    <!-- By Priority -->
                    <div class="breakdown-card">
                        <div class="breakdown-hdr">
                            <span class="breakdown-title">By Priority</span>
                            <span class="breakdown-total">{project.totalStoryCount} stories</span>
                        </div>
                        <div class="breakdown-list">
                            <template for:each={project.priorityBreakdown} for:item="row">
                                <div key={row.id} class="breakdown-row breakdown-row-pri">
                                    <span class={row.dotClass}></span>
                                    <span class="breakdown-name">{row.name}</span>
                                    <div class="breakdown-bar-track">
                                        <div class="breakdown-bar-fill" style={row.barStyle}></div>
                                    </div>
                                    <span class="breakdown-count">{row.count}</span>
                                </div>
                            </template>
                        </div>
                    </div>

                </div>
            </template>

        </template>

    </div>
</template>
