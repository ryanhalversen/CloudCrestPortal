<!-- eodTimeRetro.html -->
<template>
    <!-- CHIP DRAG GHOST (fixed-position, overlays viewport during chip drag) -->
    <template if:true={chipGhost}>
        <div class="tl-chip-ghost-fixed" style={chipGhost.style}>
            <span class="tl-chip-ghost-label">{_chipSubject}</span>
        </div>
    </template>

    <lightning-card title="Time Tracking" icon-name="standard:timesheet">

        <!-- STATS ROW -->
        <div class="slds-grid slds-gutters slds-p-horizontal_medium slds-m-bottom_medium">

            <!-- TODAY -->
            <div class="slds-col">
                <div class={statCardTodayClass} onclick={handleStatClick} data-period="today">
                    <div class="stat-label">Today</div>
                    <div class="stat-value stat-today">{stats.todayHours}h</div>
                    <div class="stat-sub">{todayEntryCount} entries</div>
                </div>
            </div>

            <!-- THIS WEEK -->
            <div class="slds-col">
                <div class={statCardWeekClass} onclick={handleStatClick} data-period="week">
                    <div class="stat-label">This Week</div>
                    <div class="stat-value stat-week">{stats.weekHours}h</div>
                </div>
            </div>

            <!-- THIS MONTH -->
            <div class="slds-col">
                <div class={statCardMonthClass} onclick={handleStatClick} data-period="month">
                    <div class="stat-label">This Month</div>
                    <div class="stat-value stat-month">{stats.monthHours}h</div>
                </div>
            </div>

            <!-- OFF-CALENDAR -->
            <div class="slds-col">
                <div class="stat-card stat-card-offcal">
                    <div class="stat-label">Off Calendar</div>
                    <div class="stat-value stat-offcal">{offCalendarCount}</div>
                    <div class="stat-sub">
                        <template if:true={hasOffCalendar}>{offCalendarHours}h not on timeline</template>
                        <template if:false={hasOffCalendar}>all entries placed ✓</template>
                    </div>
                </div>
            </div>
        </div>

        <!-- CONTROLS ROW: user picker + unlogged badge -->
        <div class="slds-grid slds-p-horizontal_medium slds-m-bottom_small slds-grid_vertical-align-center slds-gutters">
            <div class="slds-col slds-size_3-of-12">
                <lightning-combobox
                    label="Viewing"
                    variant="label-hidden"
                    value={selectedUserId}
                    options={userOptions}
                    onchange={handleUserChange}>
                </lightning-combobox>
            </div>
            <div class="slds-col slds-shrink slds-m-left_small">
                <template if:true={hasUnlogged}>
                    <span class="unlogged-badge pulse">⚠ {unloggedCount} unlogged</span>
                </template>
                <template if:false={hasUnlogged}>
                    <span class="logged-badge">✓ All logged — great work!</span>
                </template>
            </div>
        </div>


        <!-- CALENDAR NAV -->
        <template if:true={showCalNav}>
        <div class="slds-p-horizontal_medium slds-m-bottom_small">
            <div class="cal-nav">
                <button class="cal-nav-btn" onclick={handlePrev}>&#8249;</button>
                <button class="cal-nav-btn cal-nav-today" onclick={handleToday}>Today</button>
                <button class="cal-nav-btn" onclick={handleNext}>&#8250;</button>
                <span class="cal-nav-title">{calendarTitle}</span>
            </div>
        </div>
        </template>

        <!-- ACTIVE TIMER BANNER -->
        <template if:true={hasActiveTimer}>
            <div class="slds-p-horizontal_medium slds-m-bottom_small">
                <div class="eod-timer-banner">
                    <span class="eod-timer-icon">⏱</span>
                    <div class="eod-timer-info">
                        <span class="eod-timer-story">{_timerSubject}</span>
                        <span class="eod-timer-elapsed">{_timerElapsed}</span>
                    </div>
                    <input class="eod-timer-notes-input" type="text"
                           placeholder="Notes for this session…"
                           value={_timerNotes}
                           oninput={handleEodTimerNotesChange} />
                    <button class="eod-timer-stop-btn" onclick={handleEodStopTimer}>
                        ⏹ Stop &amp; Log
                    </button>
                </div>
            </div>
        </template>

        <!-- MAIN CONTENT AREA -->
        <template if:true={showList}>
        <div class="slds-p-horizontal_medium">

            <!-- ── TIME BREAKDOWN VIEW (when a stat card is active) ── -->
            <template if:true={showBreakdown}>
                <div class="breakdown-header">
                    <span class="section-label">{breakdownTitle}</span>
                    <button class="close-breakdown" onclick={handleCloseBreakdown}>✕ Back to stories</button>
                </div>

                <template if:true={isLoadingBreakdown}>
                    <lightning-spinner alternative-text="Loading" size="medium"></lightning-spinner>
                </template>

                <template if:false={isLoadingBreakdown}>
                    <template if:true={noBreakdown}>
                        <div class="empty-state">No time entries for this period.</div>
                    </template>
                    <template for:each={breakdown} for:item="b">
                        <div key={b.accountId} class="breakdown-group">
                            <div class="breakdown-account-header">
                                <span class="breakdown-account-name">📁 {b.accountName}</span>
                                <span class="breakdown-account-hours">{b.totalHours}h</span>
                            </div>
                            <template for:each={b.entries} for:item="e">
                                <div key={e.timeId} class="breakdown-entry"
                                     data-id={e.timeId}
                                     onclick={handleTimeChipNavigate}>
                                    <span class="breakdown-story">{e.subject}</span>
                                    <span class="breakdown-hours">{e.hours}h</span>
                                    <template if:true={e.notes}>
                                        <span class="breakdown-notes">· {e.notes}</span>
                                    </template>
                                </div>
                            </template>
                        </div>
                    </template>
                </template>
            </template>

            <!-- ── STORY LIST VIEW (default) ── -->
            <template if:false={showBreakdown}>
                <p class="section-label">{storiesLabel}</p>

                <template if:true={isLoading}>
                    <lightning-spinner alternative-text="Loading" size="medium"></lightning-spinner>
                </template>

                <template if:false={isLoading}>
                    <template if:true={noStories}>
                        <div class="empty-state">No stories modified on this date.</div>
                    </template>

                    <!-- Project groups -->
                    <template for:each={projectGroups} for:item="pg">
                        <div key={pg.projectId} class="project-group">
                            <div class="project-header">
                                <span class="project-icon">📁</span>
                                <span class="project-name">{pg.projectName}</span>
                                <span class="project-count">{pg.count} stories</span>
                            </div>

                            <template for:each={pg.stories} for:item="s">
                                <div key={s.storyId} class={s.rowClass}>

                                    <!-- Needs-log flag -->
                                    <template if:false={s.hasTime}>
                                        <template if:false={s.newTimeId}>
                                            <div class="needs-log-flag">
                                                <span class="pulse-dot"></span> No time logged yet
                                            </div>
                                        </template>
                                    </template>

                                    <!-- Story header -->
                                    <div class="slds-grid slds-grid_align-spread slds-m-bottom_x-small story-header-click"
                                         data-id={s.storyId}
                                         onclick={handleCardNavigate}>
                                        <div>
                                            <span class={s.priorityClass}>{s.priority}</span>
                                            <span class="story-id">#{s.caseNumber}</span>
                                            <div class="story-name">{s.storyLabel}</div>
                                            <div class="story-detail">
                                                Status: {s.status} · Last modified today
                                            </div>
                                        </div>
                                    </div>

                                    <!-- History pills -->
                                    <template if:true={s.hasHistory}>
                                        <div class="history-row">
                                            <template for:each={s.history} for:item="h">
                                                <div key={h.id} class="history-entry">
                                                    <span class="history-time">{h.createdDate}</span>
                                                    <span class="history-field">{h.field}</span>
                                                    <template if:true={h.hasOld}>
                                                        <span class="history-old">{h.oldValue}</span>
                                                        <span class="history-arrow">→</span>
                                                    </template>
                                                    <span class="history-new">{h.newValue}</span>
                                                </div>
                                            </template>
                                        </div>
                                    </template>

                                    <!-- Already logged -->
                                    <template if:true={s.hasTime}>
                                        <div class="logged-row">
                                            ✓ {s.totalHours}h logged today
                                            <template if:true={isCurrentUser}>
                                                <a onclick={handleEdit} data-id={s.storyId}
                                                    class="slds-m-left_small edit-link">+ add more</a>
                                            </template>
                                        </div>
                                        <div class="time-chips">
                                            <template for:each={s.timeEntries} for:item="te">
                                                <span key={te.timeId}
                                                      class="time-chip"
                                                      data-id={te.timeId}
                                                      onclick={handleTimeChipNavigate}>
                                                    🕐 {te.hoursLogged}h
                                                    <template if:true={te.displayLabel}>
                                                        · {te.displayLabel}
                                                    </template>
                                                </span>
                                            </template>
                                        </div>
                                    </template>

                                    <!-- Newly logged chip -->
                                    <template if:true={s.newTimeId}>
                                        <div class="time-chips slds-m-top_x-small">
                                            <span class="time-chip time-chip-new"
                                                  data-id={s.newTimeId}
                                                  onclick={handleTimeChipNavigate}>
                                                🕐 {s.newHours}h logged — click to view record
                                            </span>
                                        </div>
                                    </template>

                                    <!-- Log form (own view + not yet logged) -->
                                    <template if:true={isCurrentUser}>
                                        <template if:false={s.hasTime}>
                                            <template if:false={s.newTimeId}>
                                                <template if:true={s.hasSuggestedHours}>
                                                    <div class="wip-hint">⏱ {s.suggestedHours}h suggested from WIP tracking today</div>
                                                </template>
                                                <div class="slds-grid slds-gutters slds-grid_vertical-align-center">
                                                    <div class="slds-col slds-size_2-of-12">
                                                        <lightning-input type="text" label="Hours"
                                                            data-id={s.storyId} class="hrs-input"
                                                            variant="label-hidden" placeholder="0.0"
                                                            value={s.suggestedHours}>
                                                        </lightning-input>
                                                    </div>
                                                    <div class="slds-col slds-size_6-of-12">
                                                        <lightning-input type="text" label="Notes"
                                                            data-id={s.storyId} class="notes-input"
                                                            variant="label-hidden" placeholder="Brief note (optional)">
                                                        </lightning-input>
                                                    </div>
                                                    <div class="slds-col slds-size_2-of-12">
                                                        <lightning-button variant="success" label="Log"
                                                            data-id={s.storyId} onclick={handleLog}>
                                                        </lightning-button>
                                                    </div>
                                                    <div class="slds-col slds-size_2-of-12">
                                                        <lightning-button variant="neutral" label="Skip"
                                                            data-id={s.storyId} onclick={handleSkip}>
                                                        </lightning-button>
                                                    </div>
                                                </div>
                                            </template>
                                        </template>
                                    </template>

                                </div>
                            </template>
                        </div>
                    </template>
                </template>
            </template>
        </div>
        </template>

        <!-- DAY VIEW -->
        <template if:true={showDay}>
        <div class="slds-p-horizontal_medium">

          <!-- OFF-CALENDAR CHIP TRAY -->
          <template if:true={showOffCalTray}>
            <div class="offcal-tray">
                <span class="offcal-tray-hint">No timestamp — drag onto calendar to place</span>
                <div class="offcal-chips">
                    <template for:each={offCalendarEntries} for:item="entry">
                        <div key={entry.timeId} class="offcal-chip"
                             style={entry.chipStyle} data-id={entry.timeId}
                             onmousedown={handleChipMouseDown}>
                            <span class="offcal-chip-subject">{entry.subject}</span>
                            <span class="offcal-chip-hours">{entry.hours}h</span>
                        </div>
                    </template>
                </div>
            </div>
          </template>

          <div class="cal-scroll">
          <div class="timeline-wrap">
            <!-- LEFT: hour labels -->
            <div class="timeline-hours">
                <template for:each={timelineData.hourLabels} for:item="h">
                    <div key={h.label} class="tl-hour-label" style={h.style}>{h.label}</div>
                </template>
            </div>

            <!-- RIGHT: grid -->
            <div class="timeline-grid" style={timelineData.gridStyle}>
                <template for:each={timelineData.hourLines} for:item="line">
                    <div key={line.key} class="tl-hour-line" style={line.style}></div>
                </template>
                <template for:each={timelineData.blocks} for:item="block">
                    <div key={block.timeId} class="tl-block" style={block.style}
                         data-id={block.timeId} onmousedown={handleBlockMouseDown}>
                        <span class="tl-block-subject">{block.subject}</span>
                        <template if:true={block.metaLabel}>
                            <span class="tl-block-meta">{block.metaLabel}</span>
                        </template>
                        <template if:true={block.note}>
                            <span class="tl-block-note">{block.note}</span>
                        </template>
                        <span class="tl-block-dur">{block.durationLabel}</span>
                        <div class="tl-resize-handle"></div>
                    </div>
                </template>
                <template for:each={timelineData.gaps} for:item="gap">
                    <div key={gap.index} class={gap.cssClass}
                         data-index={gap.index} onclick={handleGapClick}
                         style={gap.style}>
                    </div>
                </template>
                <template if:true={hasActiveTimer}>
                    <div class="tl-block tl-block-active" style={activeTimerBlockStyle}
                         data-id={_timerTimeId} onclick={handleBlockClick}>
                        <span class="tl-block-subject">{_timerSubject}</span>
                        <span class="tl-block-dur">{_timerElapsed}</span>
                    </div>
                </template>
            </div>
          </div>
          </div><!-- /cal-scroll -->

          <!-- Gap panel -->
          <template if:true={selectedGap}>
            <div class="gap-panel">
              <div class="gap-panel-header">
                  <span>Log time for this {selectedGap.minutesLabel} gap</span>
                  <button class="gap-panel-close" onclick={handleGapClose}>✕</button>
              </div>
              <template if:false={gapLogStory}>
                  <template if:true={hasUnlogged}>
                      <div class="gap-panel-stories">
                          <template for:each={unloggedStoriesForGap} for:item="s">
                              <button key={s.storyId} class="gap-story-row"
                                      data-id={s.storyId} onclick={handleGapStoryPick}>
                                  <span class={s.priorityClass}>{s.priority}</span>
                                  <span class="gap-story-name">{s.subject}</span>
                              </button>
                          </template>
                      </div>
                  </template>
                  <template if:false={hasUnlogged}>
                      <p class="gap-all-logged">All stories are logged for today.</p>
                  </template>
              </template>
              <template if:true={gapLogStory}>
                  <div class="gap-log-form">
                      <span class="gap-log-story-name">{gapLogStory.subject}</span>
                      <input class="gap-log-hours" type="number" min="0.1" max="24" step="0.25"
                             value={_gapLogHours} oninput={handleGapHoursChange} placeholder="Hours" />
                      <button class="gap-log-btn" onclick={handleGapLog} disabled={gapLogNotReady}>Log</button>
                      <button class="gap-log-back" onclick={handleGapClose}>Cancel</button>
                  </div>
              </template>
            </div>
          </template>

        </div>
        </template>

        <!-- WEEK VIEW -->
        <template if:true={showWeek}>
        <div class="slds-p-horizontal_medium">

          <!-- OFF-CALENDAR CHIP TRAY -->
          <template if:true={showOffCalTray}>
            <div class="offcal-tray">
                <span class="offcal-tray-hint">No timestamp — drag onto calendar to place</span>
                <div class="offcal-chips">
                    <template for:each={offCalendarEntries} for:item="entry">
                        <div key={entry.timeId} class="offcal-chip"
                             style={entry.chipStyle} data-id={entry.timeId}
                             onmousedown={handleChipMouseDown}>
                            <span class="offcal-chip-subject">{entry.subject}</span>
                            <span class="offcal-chip-hours">{entry.hours}h</span>
                        </div>
                    </template>
                </div>
            </div>
          </template>

            <template if:true={weekIsLoading}>
                <lightning-spinner alternative-text="Loading" size="medium"></lightning-spinner>
            </template>
            <template if:false={weekIsLoading}>
            <div class="cal-scroll">
              <div class="week-wrap">
                <!-- Hour label column -->
                <div class="week-hour-col">
                    <div class="week-col-header-spacer"></div>
                    <div class="week-hours-body" style={weekGridStyle}>
                        <template for:each={weekHourLabels} for:item="h">
                            <div key={h.key} class="tl-hour-label" style={h.style}>{h.label}</div>
                        </template>
                    </div>
                </div>
                <!-- 7 day columns -->
                <template for:each={weekColumns} for:item="col">
                    <div key={col.key} class="week-col">
                        <div class={col.headerClass}>
                            <div class="week-col-day">{col.dayLabel}</div>
                            <div class="week-col-date">{col.dateLabel}</div>
                        </div>
                        <div class="week-col-grid" style={weekGridStyle}>
                            <template for:each={weekHourLines} for:item="line">
                                <div key={line.key} class="tl-hour-line" style={line.style}></div>
                            </template>
                            <template for:each={col.blocks} for:item="block">
                                <div key={block.timeId} class="tl-block" style={block.style}
                                     data-id={block.timeId} onmousedown={handleBlockMouseDown}>
                                    <span class="tl-block-subject">{block.subject}</span>
                                    <template if:true={block.metaLabel}>
                                        <span class="tl-block-meta">{block.metaLabel}</span>
                                    </template>
                                    <template if:true={block.note}>
                                        <span class="tl-block-note">{block.note}</span>
                                    </template>
                                    <span class="tl-block-dur">{block.durationLabel}</span>
                                    <div class="tl-resize-handle"></div>
                                </div>
                            </template>
                        </div>
                    </div>
                </template>
              </div>
            </div>
            </template>
        </div>
        </template>

        <!-- MONTH VIEW -->
        <template if:true={showMonth}>
        <div class="slds-p-horizontal_medium">
            <div class="month-grid-wrap">
                <div class="month-header-row">
                    <div class="month-header-cell">Mon</div>
                    <div class="month-header-cell">Tue</div>
                    <div class="month-header-cell">Wed</div>
                    <div class="month-header-cell">Thu</div>
                    <div class="month-header-cell">Fri</div>
                    <div class="month-header-cell">Sat</div>
                    <div class="month-header-cell">Sun</div>
                </div>
                <template for:each={monthGrid.weeks} for:item="week">
                    <div key={week.key} class="month-week-row">
                        <template for:each={week.days} for:item="day">
                            <template if:true={day.isEmpty}>
                                <div key={day.key} class="month-cell month-cell-empty"></div>
                            </template>
                            <template if:false={day.isEmpty}>
                                <div key={day.key} class={day.cellClass}
                                     data-date={day.dateStr} onclick={handleMonthDayClick}>
                                    <span class="month-day-num">{day.dayNum}</span>
                                    <span class="month-day-hours">{day.hoursLabel}</span>
                                </div>
                            </template>
                        </template>
                    </div>
                </template>
            </div>
        </div>
        </template>

        <!-- EDIT MODAL -->
        <template if:true={showEditModal}>
            <section role="dialog" class="slds-modal slds-fade-in-open">
                <div class="slds-modal__container">
                    <header class="slds-modal__header">
                        <h2 class="slds-modal__title">Add / Edit Time Entry</h2>
                        <button class="slds-button slds-button_icon slds-modal__close" onclick={closeModal}>
                            <lightning-icon icon-name="utility:close" size="small"></lightning-icon>
                        </button>
                    </header>
                    <div class="slds-modal__content slds-p-around_medium">
                        <lightning-input type="number" label="Hours" min="0" max="24"
                            step="0.5" value={editHours} onchange={handleEditHoursChange}>
                        </lightning-input>
                        <lightning-input type="text" label="Notes" value={editNotes}
                            onchange={handleEditNotesChange} class="slds-m-top_small">
                        </lightning-input>
                    </div>
                    <footer class="slds-modal__footer">
                        <lightning-button label="Cancel" onclick={closeModal}></lightning-button>
                        <lightning-button variant="brand" label="Save"
                            onclick={handleEditSave} class="slds-m-left_small">
                        </lightning-button>
                    </footer>
                </div>
            </section>
            <div class="slds-backdrop slds-backdrop_open"></div>
        </template>

    </lightning-card>
</template>
