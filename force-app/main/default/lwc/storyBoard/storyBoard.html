<!-- force-app/main/default/lwc/storyBoard/storyBoard.html -->
<template>
    <div class="board-wrapper">

        <!-- ── Header ── -->
        <div class="board-header">
            <div class="header-left">
                <div class="header-icon">
                    <lightning-icon icon-name="utility:kanban" size="small" style="--lwc-colorTextIcon:#00b4d8;"></lightning-icon>
                </div>
                <div>
                    <h2 class="board-title">Story Board</h2>
                    <p class="board-subtitle">{totalCount} stories total</p>
                </div>
            </div>
            <div class="header-right">
                <lightning-combobox
                    name="projectFilter"
                    variant="label-hidden"
                    placeholder="All Projects"
                    options={projectOptions}
                    value={selectedProjectId}
                    onchange={handleProjectChange}
                    dropdown-alignment="right">
                </lightning-combobox>

                <lightning-combobox
                    name="ownerFilter"
                    variant="label-hidden"
                    placeholder="All Owners"
                    options={ownerOptions}
                    value={selectedOwnerFilter}
                    onchange={handleOwnerFilterChange}
                    dropdown-alignment="right">
                </lightning-combobox>

                <template if:true={showNewStoryButton}>
                    <button class="btn-new-story" onclick={handleNewStoryClick}>
                        <lightning-icon icon-name="utility:add" size="x-small" style="--lwc-colorTextIcon:#fff;"></lightning-icon>
                        New Story
                    </button>
                </template>

                <div class="toggle-group">
                    <button class={myStoriesClass} data-value="mine" onclick={handleToggle}>My Stories</button>
                    <button class={allStoriesClass} data-value="all"  onclick={handleToggle}>All Stories</button>
                </div>
            </div>
        </div>

        <!-- ── Epic Strip ── -->
        <c-epic-management-panel
            project-id={selectedProjectId}
            selected-epic-id={selectedEpicId}
            is-dragging={isCardDragging}
            onepicselect={handleEpicSelect}>
        </c-epic-management-panel>

        <!-- ── Loading ── -->
        <template if:true={isLoading}>
            <div class="loading-state">
                <lightning-spinner alternative-text="Loading" size="medium"></lightning-spinner>
            </div>
        </template>

        <!-- ── Error ── -->
        <template if:true={errorMessage}>
            <div class="error-banner">
                <lightning-icon icon-name="utility:error" size="x-small"></lightning-icon>
                <span>{errorMessage}</span>
            </div>
        </template>

        <!-- ── Active Timer Banner ── -->
        <template if:true={hasActiveTimer}>
            <div class="timer-banner">
                <span class="timer-banner-label">{timerBannerLabel}</span>
                <button class="timer-banner-stop" onclick={handleStopTimer}>⏹ Stop</button>
            </div>
        </template>

        <!-- ── Stopped Timer Notification ── -->
        <template if:true={hasStoppedNotif}>
            <div class="timer-notif">
                <span class="timer-notif-msg">
                    Stopped: <strong>{_stoppedNotif.subject}</strong>
                    ({_stoppedNotif.minutes} min) — add notes?
                </span>
                <input class="timer-notif-input" type="text"
                       placeholder="Optional notes…"
                       value={_stoppedNotif.notes}
                       oninput={handleStopNotifNotesChange} />
                <button class="timer-notif-save"    onclick={handleStopNotifSave}>Save</button>
                <button class="timer-notif-dismiss" onclick={handleStopNotifDismiss}>Dismiss</button>
            </div>
        </template>

        <!-- ── Board ── -->
        <template if:false={isLoading}>
            <div class="board-scroll">
                <div class="board-columns">
                    <template for:each={displayColumns} for:item="col">
                        <div key={col.status}
                            class="board-col"
                            data-status={col.status}>
                            <div class="col-header" style={col.headerStyle}>
                                <div class="col-title-group" onclick={handleColSortClick} title="Click to change sort">
                                    <span class="col-title">{col.status}</span>
                                    <span class="col-sort-label">{colSortLabel}</span>
                                </div>
                                <div class="col-header-right">
                                    <span class="col-badge">{col.count}</span>
                                    <span class="col-est-hours">{col.estHoursLabel}</span>
                                </div>
                            </div>
                            <div class="col-cards" data-status={col.status}>
                                <template if:true={col.hasCards}>
                                    <template for:each={col.cards} for:item="card">
                                        <div key={card.id}
                                            class={card.cardClass}
                                            data-id={card.id}
                                            data-status={col.status}
                                            onpointerdown={handlePointerDown}
                                            onpointermove={handlePointerMove}
                                            onpointerup={handlePointerUp}
                                            onclick={handleCardClick}
                                            onmouseenter={handleCardHover}
                                            onmouseleave={handleCardLeave}>
                                            <template if:true={card.isSaving}>
                                                <div class="card-saving-overlay">
                                                    <lightning-spinner size="x-small" alternative-text="Saving"></lightning-spinner>
                                                </div>
                                            </template>
                                            <template if:true={card.hasSupportMessage}>
                                                <div class="card-support-badge" title="Support user has replied">!!</div>
                                            </template>
                                            <div class="card-subject">{card.subject}</div>
                                            <div class="card-meta">
                                                <span class={card.priorityClass}>{card.priority}</span>
                                                <template if:true={card.type}>
                                                    <span class="meta-type">{card.type}</span>
                                                </template>
                                                <template if:false={card.type}>
                                                    <span class="meta-type meta-type-none">No Type</span>
                                                </template>
                                            </div>
                                            <div class="card-footer">
                                                <span class="card-hours-logged">⏱ {card.hoursLogged}h</span>
                                                <template if:true={card.estimatedHours}>
                                                    <span class="card-est-hours">est {card.estimatedHours}h</span>
                                                </template>
                                                <template if:false={card.estimatedHours}>
                                                    <span class="card-est-hours card-est-missing">est 0h</span>
                                                </template>
                                                <span class="card-date">{card.cardAge}</span>
                                            </div>
                                        </div>
                                    </template>
                                </template>
                                <template if:false={col.hasCards}>
                                    <div class="col-empty" data-status={col.status}>No stories</div>
                                </template>
                            </div>
                        </div>
                    </template>
                </div>
            </div>
        </template>

        <!-- ── Distribution Bar ── -->
        <template if:false={isLoading}>
            <div class="dist-bar-wrapper">
                <div class="dist-bar-track">
                    <template for:each={distBarSegments} for:item="seg">
                        <div key={seg.status}
                             class="dist-bar-segment"
                             style={seg.style}
                             title={seg.tooltip}>
                        </div>
                    </template>
                </div>
                <div class="dist-bar-legend">
                    <template for:each={distBarLegend} for:item="item">
                        <div key={item.status} class="legend-item" style={item.dimStyle}>
                            <span class="legend-dot" style={item.dotStyle}></span>
                            <span class="legend-status">{item.status}</span>
                            <span class="legend-stats" style={item.statsStyle}>{item.statsLabel}</span>
                        </div>
                    </template>
                </div>
            </div>
        </template>

        <!-- ── Story Detail Modal ── -->
        <template if:true={showNormalModal}>
            <div class="modal-backdrop" onclick={handleModalBackdropClick}>
                <div class={modalContainerClass} onclick={handleModalContainerClick}>
                <div class="modal-story-pane">
                    <div class="modal-header">
                        <!-- Row 1: identifiers + actions -->
                        <div class="modal-header-top">
                            <div class="modal-header-id">
                                <span class={modalCard.priorityClass}>{modalCard.priority}</span>
                                <span class="modal-case-number">#{modalCard.caseNumber}</span>
                                <template if:true={modalCard.type}>
                                    <span class="meta-type">{modalCard.type}</span>
                                </template>
                            </div>
                            <div class="modal-header-actions">
                                <a href={modalCard.recordUrl}
                                    target="_blank"
                                    class="btn-open-record"
                                    title="Open full record">
                                    <lightning-icon icon-name="utility:new_window" size="x-small"></lightning-icon>
                                    Open
                                </a>
                                <template if:true={isModalTimerActive}>
                                    <button class="btn-modal-timer btn-modal-timer-stop"
                                            onclick={handleStopTimer}
                                            title="Stop timer">⏹ Stop Timer</button>
                                </template>
                                <template if:false={isModalTimerActive}>
                                    <button class="btn-modal-timer btn-modal-timer-start"
                                            data-id={modalCard.id}
                                            onclick={handleStartTimer}
                                            title="Start timer">▶ Start Timer</button>
                                </template>
                                <button class="modal-close" onclick={handleModalClose}>✕</button>
                            </div>
                        </div>

                        <!-- Row 2: owner · epic · contact -->
                        <div class="modal-header-meta">
                            <span class="modal-meta-label">Owner</span>
                            <span class="modal-owner-name">{modalCard.ownerName}</span>
                            <button class="btn-reassign" onclick={handleReassignClick} disabled={isReassigning}>
                                <template if:true={isReassigning}>…</template>
                                <template if:false={isReassigning}>Reassign</template>
                            </button>

                            <template if:true={modalCard.projectName}>
                                <span class="modal-meta-sep">·</span>
                                <span class="modal-meta-label">Project</span>
                                <span class="modal-epic-name">{modalCard.projectName}</span>
                            </template>

                            <span class="modal-meta-sep">·</span>
                            <span class="modal-meta-label">Epic</span>
                            <span class="modal-epic-name">{modalEpicDisplay}</span>
                            <button class="btn-change-epic" onclick={handleChangeEpicClick} disabled={isChangingEpic}>Change</button>

                            <span class="modal-meta-sep">·</span>
                            <span class="modal-meta-label">Support</span>
                            <span class="modal-epic-name">{modalSupportDisplay}</span>
                            <button class="btn-change-epic" onclick={handleSupportAssignClick} disabled={isAssigningSupport}>Assign</button>
                            <template if:true={modalCard.storySupportId}>
                                <button class="btn-remove-support" onclick={handleSupportRemove} disabled={isAssigningSupport} title="Remove support user">✕</button>
                            </template>

                            <span class="modal-meta-sep">·</span>
                            <span class="modal-meta-label">Contact</span>
                            <span class="modal-contact-name">{modalCard.contactName}</span>
                            <button class="btn-change-epic" onclick={handleContactAssignClick} disabled={isAssigningContact}>
                                <template if:true={modalCard.contactName}>Change</template>
                                <template if:false={modalCard.contactName}>Assign</template>
                            </button>
                            <template if:true={modalCard.contactId}>
                                <button class="btn-remove-support" onclick={handleContactRemove} disabled={isAssigningContact} title="Remove contact">✕</button>
                            </template>
                        </div>
                    </div>

                    <!-- Epic change (expands between header and body) -->
                    <template if:true={showEpicChange}>
                        <div class="modal-owner-search">
                            <template if:true={isLoadingEpics}>
                                <span class="owner-searching">Loading epics…</span>
                            </template>
                            <template if:false={isLoadingEpics}>
                                <template if:true={_epicOptions.length}>
                                    <div class="owner-results">
                                        <template for:each={_epicOptions} for:item="ep">
                                            <div key={ep.epicId}
                                                 class="owner-result-item"
                                                 data-id={ep.epicId}
                                                 data-name={ep.name}
                                                 onclick={handleModalEpicPick}>
                                                {ep.name}
                                            </div>
                                        </template>
                                    </div>
                                </template>
                                <template if:false={_epicOptions.length}>
                                    <span class="owner-searching">No epics found for this project.</span>
                                </template>
                            </template>
                            <template if:true={epicChangeError}>
                                <span class="field-error">{epicChangeError}</span>
                            </template>
                            <div class="owner-search-wrap">
                                <button class="btn-cancel ns-cancel-btn" onclick={handleEpicChangeCancel}>Cancel</button>
                            </div>
                        </div>
                    </template>

                    <!-- Story Support search (expands between header and body) -->
                    <template if:true={showSupportSearch}>
                        <div class="modal-owner-search">
                            <div class="owner-search-wrap">
                                <input class="new-story-input owner-search-input"
                                       type="text"
                                       placeholder="Search contacts by name…"
                                       oninput={handleSupportSearchChange} />
                                <button class="btn-cancel ns-cancel-btn" onclick={handleSupportSearchCancel}>Cancel</button>
                            </div>
                            <template if:true={isSearchingSupport}>
                                <span class="owner-searching">Searching…</span>
                            </template>
                            <template if:true={supportSearchResults.length}>
                                <div class="owner-results">
                                    <template for:each={supportSearchResults} for:item="c">
                                        <div key={c.id}
                                             class="owner-result-item"
                                             data-id={c.id}
                                             data-name={c.name}
                                             onclick={handleSupportResultSelect}>
                                            {c.name}
                                        </div>
                                    </template>
                                </div>
                            </template>
                            <template if:true={supportAssignError}>
                                <span class="field-error">{supportAssignError}</span>
                            </template>
                        </div>
                    </template>

                    <!-- Contact dropdown -->
                    <template if:true={showContactSearch}>
                        <div class="modal-owner-search">
                            <div class="owner-search-wrap">
                                <span class="modal-meta-label" style="padding:6px 0;">Select a contact</span>
                                <button class="btn-cancel ns-cancel-btn" onclick={handleContactSearchCancel}>Cancel</button>
                            </div>
                            <template if:true={isSearchingContact}>
                                <span class="owner-searching">Loading…</span>
                            </template>
                            <template if:true={contactSearchResults.length}>
                                <div class="owner-results">
                                    <template for:each={contactSearchResults} for:item="c">
                                        <div key={c.id}
                                             class="owner-result-item"
                                             data-id={c.id}
                                             data-name={c.name}
                                             onclick={handleContactResultSelect}>
                                            <span>{c.name}</span>
                                            <template if:true={c.title}>
                                                <span class="contact-result-title">{c.title}</span>
                                            </template>
                                        </div>
                                    </template>
                                </div>
                            </template>
                            <template if:true={contactAssignError}>
                                <span class="field-error">{contactAssignError}</span>
                            </template>
                        </div>
                    </template>

                    <!-- Owner search (expands between header and body) -->
                    <template if:true={showOwnerSearch}>
                        <div class="modal-owner-search">
                            <div class="owner-search-wrap">
                                <input class="new-story-input owner-search-input"
                                       type="text"
                                       placeholder="Search by name…"
                                       oninput={handleOwnerSearchChange} />
                                <button class="btn-cancel ns-cancel-btn" onclick={handleOwnerSearchCancel}>Cancel</button>
                            </div>
                            <template if:true={isSearchingOwners}>
                                <span class="owner-searching">Searching…</span>
                            </template>
                            <template if:true={ownerSearchResults.length}>
                                <div class="owner-results">
                                    <template for:each={ownerSearchResults} for:item="u">
                                        <div key={u.id}
                                             class="owner-result-item"
                                             data-id={u.id}
                                             data-name={u.name}
                                             onclick={handleOwnerResultSelect}>
                                            {u.name}
                                        </div>
                                    </template>
                                </div>
                            </template>
                            <template if:true={reassignError}>
                                <span class="field-error">{reassignError}</span>
                            </template>
                        </div>
                    </template>

                    <div class="modal-body modal-body-split">

                        <!-- ── Left: story details ── -->
                        <div class="modal-col-detail">
                            <template if:false={isEditingSubjectDesc}>
                                <div class="subject-display-row">
                                    <h3 class="modal-subject">{modalCard.subject}</h3>
                                    <button class="ns-edit-btn subject-edit-btn" onclick={handleEditSubjectDescClick} title="Edit subject &amp; description">✎</button>
                                </div>
                                <template if:true={modalCard.description}>
                                    <p class="modal-description">{modalCard.description}</p>
                                </template>
                                <template if:false={modalCard.description}>
                                    <p class="modal-no-desc">No description provided.</p>
                                </template>
                            </template>
                            <template if:true={isEditingSubjectDesc}>
                                <div class="subject-edit-form">
                                    <input type="text"
                                           class="new-story-input subject-edit-input"
                                           value={editSubjectInput}
                                           oninput={handleEditSubjectChange}
                                           placeholder="Subject…" />
                                    <textarea class="new-story-textarea story-detail-textarea"
                                              oninput={handleEditDescChange}
                                              placeholder="Description…"
                                              rows="4">{editDescInput}</textarea>
                                    <div class="ns-edit-actions">
                                        <button class="btn-save-hrs" onclick={handleEditSubjectDescSave} disabled={isSavingSubjectDesc}>
                                            <template if:true={isSavingSubjectDesc}>Saving…</template>
                                            <template if:false={isSavingSubjectDesc}>Save</template>
                                        </button>
                                        <button class="btn-cancel ns-cancel-btn" onclick={handleEditSubjectDescCancel}>Cancel</button>
                                        <template if:true={subjectDescSaveError}>
                                            <span class="field-error">Failed to save — please try again</span>
                                        </template>
                                    </div>
                                </div>
                            </template>

                            <div class="priority-status-row">
                                <div class="modal-field-row">
                                    <label class="modal-field-label">Priority</label>
                                    <div class="modal-priority-options">
                                        <template for:each={priorityOptions} for:item="opt">
                                            <button key={opt.value}
                                                class={opt.btnClass}
                                                data-value={opt.value}
                                                onclick={handlePrioritySelect}
                                                disabled={isSavingPriority}>
                                                {opt.label}
                                            </button>
                                        </template>
                                    </div>
                                </div>
                                <div class="modal-field-row">
                                    <label class="modal-field-label">Status</label>
                                    <span class="modal-status-value">{modalCard.status}</span>
                                </div>
                                <div class="modal-field-row modal-type-row">
                                    <label class="modal-field-label">Type</label>
                                    <lightning-combobox
                                        variant="label-hidden"
                                        value={modalCard.type}
                                        options={typeOptions}
                                        onchange={handleTypeChange}
                                        disabled={isSavingType}
                                        class="modal-type-combo">
                                    </lightning-combobox>
                                </div>
                            </div>

                            <div class="modal-field-row">
                                <label class="modal-field-label">Estimated Hours</label>
                                <div class="est-hours-row">
                                    <input
                                        type="number"
                                        class="new-story-input"
                                        value={estHoursInput}
                                        oninput={handleEstHoursChange}
                                        min="0"
                                        step="0.25" />
                                    <button class="btn-save-hrs" onclick={handleEstHoursSave} disabled={isSavingEstHours}>
                                        <template if:true={isSavingEstHours}>Saving…</template>
                                        <template if:false={isSavingEstHours}>Save</template>
                                    </button>
                                </div>
                                <template if:true={estHoursSaveError}>
                                    <span class="field-error">Failed to save — please try again</span>
                                </template>
                            </div>

                            <div class="modal-field-row">
                                <label class="modal-field-label">Solution</label>
                                <textarea
                                    class="new-story-textarea story-detail-textarea"
                                    placeholder="Describe the solution…"
                                    oninput={handleSolutionChange}
                                    rows="4">{solutionInput}</textarea>
                            </div>
                            <div class="modal-field-row">
                                <label class="modal-field-label">Components to Deploy</label>
                                <textarea
                                    class="new-story-textarea story-detail-textarea"
                                    placeholder="List components, classes, or metadata…"
                                    oninput={handleComponentsChange}
                                    rows="4">{componentsInput}</textarea>
                            </div>
                            <div class="modal-field-row">
                                <label class="modal-field-label">Q&amp;A</label>
                                <textarea
                                    class="new-story-textarea story-detail-textarea"
                                    placeholder="Notes from quality assurance testing…"
                                    oninput={handleQaChange}
                                    rows="4">{qaInput}</textarea>
                            </div>

                        </div>

                        <!-- ── Right: time records ── -->
                        <div class="modal-col-time">
                            <div class="time-panel-header">
                                <span class="time-panel-title">Time Logged</span>
                                <span class="time-panel-total">{totalTimeLogged}</span>
                            </div>

                            <!-- ── Log Time form ── -->
                            <div class="log-time-form">
                                <input
                                    type="number"
                                    class="log-time-hours"
                                    placeholder="Hours"
                                    min="0.25"
                                    step="0.25"
                                    oninput={handleNewTimeHoursChange}
                                />
                                <input
                                    type="text"
                                    class="log-time-desc"
                                    placeholder="Description (optional)"
                                    oninput={handleNewTimeDescChange}
                                />
                                <button class="btn-log-time" onclick={handleLogTime} disabled={isSavingTime}>
                                    <template if:true={isSavingTime}>Saving…</template>
                                    <template if:false={isSavingTime}>+ Log</template>
                                </button>
                            </div>

                            <template if:true={isLoadingTime}>
                                <div class="time-loading">
                                    <lightning-spinner size="x-small" alternative-text="Loading"></lightning-spinner>
                                </div>
                            </template>

                            <template if:false={isLoadingTime}>
                                <template if:true={timeEntries.length}>
                                    <div class="time-entry-list">
                                        <template for:each={editableTimeEntries} for:item="t">
                                            <div key={t.id} class="time-entry">
                                                <template if:false={t.isEditing}>
                                                    <span class="te-hours">{t.hoursLabel}</span>
                                                    <div class="te-right">
                                                        <span class="te-desc">{t.description}</span>
                                                        <span class="te-meta">{t.date} · {t.user}</span>
                                                    </div>
                                                    <button class="ns-edit-btn" data-id={t.id} onclick={handleEditTime} title="Edit">✎</button>
                                                </template>
                                                <template if:true={t.isEditing}>
                                                    <div class="te-edit-form">
                                                        <div class="te-edit-inputs">
                                                            <input type="number" class="te-edit-hours" value={editingTimeHours}
                                                                oninput={handleEditTimeHoursChange} min="0" step="0.25" placeholder="Hours"/>
                                                            <input type="text" class="te-edit-desc" value={editingTimeDesc}
                                                                oninput={handleEditTimeDescChange} placeholder="Description (optional)"/>
                                                        </div>
                                                        <div class="ns-edit-actions">
                                                            <button class="btn-save-hrs" onclick={handleEditTimeSave} disabled={isSavingTimeEdit}>
                                                                <template if:true={isSavingTimeEdit}>Saving…</template>
                                                                <template if:false={isSavingTimeEdit}>Save</template>
                                                            </button>
                                                            <button class="btn-cancel ns-cancel-btn" onclick={handleEditTimeCancel}>Cancel</button>
                                                        </div>
                                                    </div>
                                                </template>
                                            </div>
                                        </template>
                                    </div>
                                </template>
                                <template if:false={timeEntries.length}>
                                    <div class="time-empty">No time logged yet.</div>
                                </template>
                            </template>

                            <!-- ── Next Steps log ── -->
                            <div class="panel-divider"></div>
                            <div class="time-panel-header">
                                <span class="time-panel-title">Next Steps</span>
                                <span class="time-panel-total">{nextSteps.length}</span>
                            </div>

                            <!-- Next Step input -->
                            <div class="next-step-input-wrap">
                                <textarea
                                    class="new-story-textarea next-step-textarea"
                                    placeholder="Describe what was done or what comes next…"
                                    oninput={handleNextStepChange}
                                    rows="2">
                                </textarea>
                                <button class="btn-save-hrs" onclick={handleNextStepSave} disabled={isSavingStep}>
                                    <template if:true={isSavingStep}>Saving…</template>
                                    <template if:false={isSavingStep}>+ Add</template>
                                </button>
                            </div>

                            <template if:true={isLoadingTime}>
                                <div class="time-empty">Loading…</div>
                            </template>
                            <template if:false={isLoadingTime}>
                                <template if:true={nextSteps.length}>
                                    <div class="time-entry-list">
                                        <template for:each={editableNextSteps} for:item="s">
                                            <div key={s.id} class="next-step-entry">
                                                <template if:false={s.isEditing}>
                                                    <span class="ns-arrow">→</span>
                                                    <div class="te-right">
                                                        <span class="te-desc">{s.note}</span>
                                                        <span class="te-meta">{s.date}<template if:true={s.user}> · {s.user}</template></span>
                                                    </div>
                                                    <button class="ns-edit-btn" data-id={s.id} onclick={handleEditStep} title="Edit">✎</button>
                                                </template>
                                                <template if:true={s.isEditing}>
                                                    <div class="ns-edit-form">
                                                        <textarea
                                                            class="new-story-textarea ns-edit-textarea"
                                                            oninput={handleEditStepChange}
                                                            rows="2">{s.note}</textarea>
                                                        <div class="ns-edit-actions">
                                                            <button class="btn-save-hrs" onclick={handleEditStepSave} disabled={isSavingStepEdit}>
                                                                <template if:true={isSavingStepEdit}>Saving…</template>
                                                                <template if:false={isSavingStepEdit}>Save</template>
                                                            </button>
                                                            <button class="btn-cancel ns-cancel-btn" onclick={handleEditStepCancel}>Cancel</button>
                                                        </div>
                                                    </div>
                                                </template>
                                            </div>
                                        </template>
                                    </div>
                                </template>
                                <template if:false={nextSteps.length}>
                                    <div class="time-empty">No steps logged yet.</div>
                                </template>
                            </template>
                        </div>

                        <!-- ── Support Chat ── -->
                        <template if:true={showChatPanel}>
                            <div class="modal-col-chat">
                                <div class="chat-header">
                                    <lightning-icon icon-name="utility:chat" size="x-small" style="--lwc-colorTextIcon:#00b4d8;"></lightning-icon>
                                    <span class="chat-header-title">Support Chat</span>
                                    <span class="chat-header-sub">Saved to Chatter</span>
                                </div>

                                <div class="chat-messages">
                                    <template if:true={isLoadingChat}>
                                        <div class="chat-empty">Loading…</div>
                                    </template>
                                    <template if:false={isLoadingChat}>
                                        <template if:true={chatMessages.length}>
                                            <template for:each={chatMessages} for:item="m">
                                                <div key={m.id} class="chat-msg">
                                                    <div class="chat-msg-meta">
                                                        <span class="chat-msg-user">{m.user}</span>
                                                        <span class="chat-msg-time">{m.timeLabel}</span>
                                                    </div>
                                                    <p class="chat-msg-body">{m.body}</p>
                                                </div>
                                            </template>
                                        </template>
                                        <template if:false={chatMessages.length}>
                                            <div class="chat-empty">No messages yet. Start the conversation!</div>
                                        </template>
                                    </template>
                                </div>

                                <div class="chat-input-wrap">
                                    <textarea
                                        class="chat-input-textarea"
                                        placeholder="Type a message… (Enter to send, Shift+Enter for new line)"
                                        oninput={handleChatInputChange}
                                        onkeydown={handleChatKeyDown}
                                        rows="2">
                                    </textarea>
                                    <button class="btn-chat-send" onclick={handleChatSend} disabled={isSendingChat}>
                                        <template if:true={isSendingChat}>Sending…</template>
                                        <template if:false={isSendingChat}>Send</template>
                                    </button>
                                    <template if:true={chatSendError}>
                                        <span class="field-error">{chatSendError}</span>
                                    </template>
                                </div>
                            </div>
                        </template>

                    </div>

                    <!-- ── Documentation / Save ── -->
                    <div class="modal-body-fields">
                        <div class="modal-field-row modal-field-documentation">
                            <label class="modal-field-label">Documentation</label>
                            <textarea
                                class="new-story-textarea story-detail-textarea"
                                placeholder="Lucid Cart, Canva Documents, PowerPoint, Tagno Training Material, etc."
                                oninput={handleDocumentationChange}
                                rows="3">{documentationInput}</textarea>
                        </div>
                        <template if:true={isClosedStatus}>
                            <div class="modal-field-row modal-closing-comments-row">
                                <label class="modal-field-label">Closing Comments</label>
                                <p class="modal-closing-comments-text">{modalCard.closingComments}</p>
                            </div>
                        </template>
                        <div class="text-fields-save-row">
                            <template if:true={textFieldsSaveSuccess}>
                                <span class="text-fields-saved">✓ Saved</span>
                            </template>
                            <template if:true={textFieldsSaveError}>
                                <span class="field-error">Failed to save — please try again</span>
                            </template>
                            <button class="btn-save-hrs" onclick={handleTextFieldsSave} disabled={isSavingTextFields}>
                                <template if:true={isSavingTextFields}>Saving…</template>
                                <template if:false={isSavingTextFields}>Save Fields</template>
                            </button>
                        </div>
                    </div>

                    <!-- ── Attachments ── -->
                    <div class={attachSectionClass}
                         ondragover={handleDragOver}
                         ondragleave={handleDragLeave}
                         ondrop={handleDrop}>
                        <div class="attach-section-header">
                            <span class="attach-section-title">Attachments</span>
                            <label class="btn-add-attach" title="Upload file">
                                <template if:true={_isUploadingAttachment}>Uploading…</template>
                                <template if:false={_isUploadingAttachment}>+ Add</template>
                                <input type="file" class="attach-file-input" onchange={handleFileInputChange} disabled={_isUploadingAttachment} />
                            </label>
                        </div>
                        <template if:true={_isDragOver}>
                            <div class="attach-drop-zone">Drop file here to upload</div>
                        </template>
                        <template if:false={_isDragOver}>
                            <template if:true={_isLoadingAttachments}>
                                <div class="attach-empty">Loading…</div>
                            </template>
                            <template if:false={_isLoadingAttachments}>
                                <template if:true={hasAttachments}>
                                    <div class="attach-list">
                                        <template for:each={_attachments} for:item="a">
                                            <div key={a.contentDocumentId} class="attach-chip">
                                                <span class="attach-ext">{a.fileExtension}</span>
                                                <span class="attach-name" title={a.title}>{a.title}</span>
                                                <button class="attach-btn-open" data-id={a.contentDocumentId} onclick={handleOpenAttachment}>View</button>
                                                <a class="attach-btn-dl" href={a.downloadUrl} target="_blank" onclick={handleAttachLinkClick}>↓</a>
                                                <button class="attach-btn-del" data-id={a.contentDocumentId} onclick={handleDeleteAttachment}>✕</button>
                                            </div>
                                        </template>
                                    </div>
                                </template>
                                <template if:false={hasAttachments}>
                                    <div class="attach-empty">Drop a file or click + Add to attach</div>
                                </template>
                            </template>
                        </template>
                    </div>

                    <div class="modal-footer">
                        <template if:true={modalSaveError}>
                            <span class="modal-save-error">⚠ Failed to save — please try again</span>
                        </template>
                        <template if:true={isSavingPriority}>
                            <span class="modal-saving">Saving…</span>
                        </template>
                        <button class="btn-cancel" onclick={handleModalClose}>Close</button>
                    </div>
                </div><!-- end modal-story-pane -->

                </div><!-- end modal-container (non-viewer) -->
            </div>
        </template>

        <!-- ── Story Modal WITH Attachment Viewer (side-by-side) ── -->
        <template if:true={_openedAttachment}>
            <div class="modal-backdrop" onclick={handleModalBackdropClick}>
                <div class="modal-container modal-container-with-viewer" onclick={handleModalContainerClick}>

                    <!-- LEFT: Attachment Viewer -->
                    <div class="modal-viewer-pane">
                        <div class="viewer-topbar">
                            <span class="viewer-title" title={_openedAttachment.title}>{_openedAttachment.title}</span>
                            <div class="viewer-topbar-actions">
                                <template if:true={_openedAttachment.isImage}>
                                    <button class="btn-viewer-zoom" onclick={handleZoomOut}>−</button>
                                    <span class="viewer-zoom-label" onclick={handleZoomReset}>{imgZoomLabel}</span>
                                    <button class="btn-viewer-zoom" onclick={handleZoomIn}>+</button>
                                </template>
                                <a class="btn-viewer-dl" href={_openedAttachment.downloadUrl} target="_blank">⬇ Download</a>
                                <button class="btn-viewer-close" onclick={handleCloseAttachmentViewer}>✕</button>
                            </div>
                        </div>
                        <div class="viewer-body">
                            <template if:true={_openedAttachment.isImage}>
                                <img src={_openedAttachment.downloadUrl} class="viewer-img" style={imgZoomStyle} alt={_openedAttachment.title} />
                            </template>
                            <template if:false={_openedAttachment.isImage}>
                                <iframe src={_openedAttachment.downloadUrl} class="viewer-iframe" title={_openedAttachment.title}></iframe>
                            </template>
                        </div>
                    </div>

                    <!-- RIGHT: Story pane (re-rendered while viewer is open) -->
                    <div class="modal-story-pane">
                        <div class="modal-header">
                            <div class="modal-header-top">
                                <div class="modal-header-id">
                                    <span class={modalCard.priorityClass}>{modalCard.priority}</span>
                                    <span class="modal-case-number">#{modalCard.caseNumber}</span>
                                    <template if:true={modalCard.type}>
                                        <span class="meta-type">{modalCard.type}</span>
                                    </template>
                                </div>
                                <div class="modal-header-actions">
                                    <button class="btn-viewer-close" onclick={handleCloseAttachmentViewer} title="Back to normal view">← Back</button>
                                    <button class="modal-close" onclick={handleModalClose}>✕</button>
                                </div>
                            </div>
                            <div class="modal-header-meta">
                                <span class="modal-meta-label">Project</span>
                                <span class="modal-epic-name">{modalCard.projectName}</span>
                                <span class="modal-meta-sep">·</span>
                                <span class="modal-meta-label">Status</span>
                                <span class="modal-epic-name">{modalCard.status}</span>
                            </div>
                        </div>
                        <div style="padding: 16px 20px; flex:1; overflow-y:auto;">
                            <h3 style="font-size:1rem; font-weight:700; color:#111827; margin:0 0 8px;">{modalCard.subject}</h3>
                            <p style="font-size:0.85rem; color:#4b5563; margin:0 0 16px;">{modalCard.description}</p>
                            <div style="display:flex; flex-direction:column; gap:10px;">
                                <div class="modal-field-row">
                                    <label class="modal-field-label">Solution</label>
                                    <textarea class="new-story-textarea story-detail-textarea" placeholder="Describe the solution…" oninput={handleSolutionChange} rows="4">{solutionInput}</textarea>
                                </div>
                                <div class="modal-field-row">
                                    <label class="modal-field-label">Components to Deploy</label>
                                    <textarea class="new-story-textarea story-detail-textarea" placeholder="List components, classes, or metadata…" oninput={handleComponentsChange} rows="4">{componentsInput}</textarea>
                                </div>
                                <div class="modal-field-row">
                                    <label class="modal-field-label">Q&amp;A</label>
                                    <textarea class="new-story-textarea story-detail-textarea" placeholder="Notes from quality assurance testing…" oninput={handleQaChange} rows="4">{qaInput}</textarea>
                                </div>
                                <div class="modal-field-row">
                                    <label class="modal-field-label">Documentation</label>
                                    <textarea class="new-story-textarea story-detail-textarea" placeholder="Lucid Cart, Canva Documents, PowerPoint…" oninput={handleDocumentationChange} rows="3">{documentationInput}</textarea>
                                </div>
                                <div class="text-fields-save-row">
                                    <button class="btn-save-hrs" onclick={handleTextFieldsSave} disabled={isSavingTextFields}>
                                        <template if:true={isSavingTextFields}>Saving…</template>
                                        <template if:false={isSavingTextFields}>Save Fields</template>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>

                </div>
            </div>
        </template>

        <!-- ── Close Story Modal ── -->
        <template if:true={showCloseModal}>
            <div class="modal-backdrop">
                <div class="sm-modal">

                    <div class="modal-header">
                        <div class="modal-header-meta">
                            <lightning-icon icon-name="utility:check" size="x-small" style="--lwc-colorTextIcon:#374151;"></lightning-icon>
                            <span class="modal-case-number">{closeModalTitle}</span>
                        </div>
                        <button class="modal-close" onclick={handleCloseModalCancel} disabled={isClosingStory}>✕</button>
                    </div>

                    <div class="close-modal-subtitle">{closeFormSubject}</div>

                    <div class="modal-body">

                        <!-- Closing Comments -->
                        <div class="modal-field-row">
                            <label class="modal-field-label">
                                Closing Comments <span class="new-story-required">*</span>
                            </label>
                            <textarea
                                class={closeCommentsClass}
                                placeholder="Summarize what was completed or why this was cancelled…"
                                oninput={handleCloseFormCommentsChange}
                                rows="3">
                            </textarea>
                            <template if:true={closeFormCommentsError}>
                                <span class="field-error">Closing comments are required.</span>
                            </template>
                        </div>

                        <!-- Two-column row: Department + Type -->
                        <div class="close-form-two-col">
                            <div class="modal-field-row">
                                <label class="modal-field-label">
                                    Department <span class="new-story-required">*</span>
                                </label>
                                <lightning-combobox
                                    name="closeDept"
                                    variant="label-hidden"
                                    placeholder="--Select--"
                                    options={departmentOptions}
                                    value={closeFormDepartment}
                                    onchange={handleCloseFormDeptChange}>
                                </lightning-combobox>
                                <template if:true={closeFormDeptError}>
                                    <span class="field-error">Required.</span>
                                </template>
                            </div>
                            <div class="modal-field-row">
                                <label class="modal-field-label">
                                    Type <span class="new-story-required">*</span>
                                </label>
                                <lightning-combobox
                                    name="closeType"
                                    variant="label-hidden"
                                    placeholder="--Select--"
                                    options={typeOptions}
                                    value={closeFormType}
                                    onchange={handleCloseFormTypeChange}>
                                </lightning-combobox>
                                <template if:true={closeFormTypeError}>
                                    <span class="field-error">Required.</span>
                                </template>
                            </div>
                        </div>

                        <!-- Priority -->
                        <div class="modal-field-row">
                            <label class="modal-field-label">
                                Priority <span class="new-story-required">*</span>
                            </label>
                            <div class="modal-priority-options">
                                <template for:each={closePriorityOptions} for:item="opt">
                                    <button key={opt.value}
                                        class={opt.btnClass}
                                        data-value={opt.value}
                                        onclick={handleCloseFormPrioritySelect}>
                                        {opt.label}
                                    </button>
                                </template>
                            </div>
                            <template if:true={closeFormPriorityError}>
                                <span class="field-error">Priority is required.</span>
                            </template>
                        </div>

                    </div>

                    <div class="modal-footer">
                        <template if:true={closeStoryError}>
                            <span class="modal-save-error">⚠ {closeStoryError}</span>
                        </template>
                        <template if:true={isClosingStory}>
                            <span class="modal-saving">Saving…</span>
                        </template>
                        <button class="btn-cancel" onclick={handleCloseModalCancel} disabled={isClosingStory}>Cancel</button>
                        <button class="btn-close-story" onclick={handleCloseStorySubmit} disabled={isClosingStory}>{closeModalActionLabel}</button>
                    </div>

                </div>
            </div>
        </template>

        <!-- ── New Story Modal ── -->
        <template if:true={showNewStoryModal}>
            <div class="modal-backdrop" onclick={handleNewStoryBackdropClick}>
                <div class="modal-container modal-container-new-story" onclick={handleModalContainerClick}>

                    <div class="modal-header">
                        <div class="modal-header-meta">
                            <lightning-icon icon-name="utility:add" size="x-small" style="--lwc-colorTextIcon:#00b4d8;"></lightning-icon>
                            <span class="modal-case-number">New Story</span>
                        </div>
                        <div class="modal-header-actions">
                            <button class="modal-close" onclick={handleNewStoryClose}>✕</button>
                        </div>
                    </div>

                    <!-- Context: project + epic this story will be filed under -->
                    <div class="new-story-context">
                        <span class="new-story-context-item">
                            <span class="new-story-context-label">Project</span>
                            <span class="new-story-context-value">{newStoryProjectName}</span>
                        </span>
                        <template if:true={newStoryEpicName}>
                            <span class="new-story-context-sep">›</span>
                            <span class="new-story-context-item">
                                <span class="new-story-context-label">Epic</span>
                                <span class="new-story-context-value">{newStoryEpicName}</span>
                            </span>
                        </template>
                    </div>

                    <div class="modal-body">

                        <div class="modal-field-row">
                            <label class="modal-field-label">
                                Subject <span class="new-story-required">*</span>
                            </label>
                            <input
                                type="text"
                                class={newStorySubjectClass}
                                placeholder="Enter story subject…"
                                value={newStorySubject}
                                oninput={handleNewStorySubjectChange}
                                maxlength="255" />
                            <template if:true={newStorySubjectError}>
                                <span class="field-error">Subject is required.</span>
                            </template>
                        </div>

                        <div class="modal-field-row">
                            <label class="modal-field-label">Description</label>
                            <textarea
                                class="new-story-textarea"
                                placeholder="Optional description…"
                                oninput={handleNewStoryDescriptionChange}
                                rows="3">
                            </textarea>
                        </div>

                        <div class="modal-field-row">
                            <label class="modal-field-label">Priority</label>
                            <div class="modal-priority-options">
                                <template for:each={priorityOptions} for:item="opt">
                                    <button key={opt.value}
                                        class={opt.newBtnClass}
                                        data-value={opt.value}
                                        onclick={handleNewStoryPrioritySelect}>
                                        {opt.label}
                                    </button>
                                </template>
                            </div>
                        </div>

                        <div class="modal-field-row">
                            <label class="modal-field-label">Department</label>
                            <lightning-combobox
                                name="newStoryDepartment"
                                placeholder="--None--"
                                options={departmentOptions}
                                value={newStoryDepartment}
                                onchange={handleNewStoryDepartmentChange}>
                            </lightning-combobox>
                        </div>

                    </div>

                    <div class="modal-footer">
                        <template if:true={newStorySaveError}>
                            <span class="modal-save-error">⚠ Failed to create story — please try again</span>
                        </template>
                        <template if:true={isCreatingStory}>
                            <span class="modal-saving">Creating…</span>
                        </template>
                        <button class="btn-cancel" onclick={handleNewStoryClose} disabled={isCreatingStory}>Cancel</button>
                        <button class="btn-save"   onclick={handleNewStorySubmit} disabled={isCreatingStory}>Create Story</button>
                    </div>

                </div>
            </div>
        </template>

    </div>
</template>
