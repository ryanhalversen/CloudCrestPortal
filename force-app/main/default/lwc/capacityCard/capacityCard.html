<!-- force-app/main/default/lwc/capacityCard/capacityCard.html -->
<template>
    <div class={cardClass} onclick={handleClick}>

        <!-- Loading skeleton -->
        <template if:false={hasData}>
            <div class="card-skeleton">
                <div class="skeleton-bar sk-short"></div>
                <div class="skeleton-bar sk-question"></div>
                <div class="skeleton-kpis">
                    <div class="skeleton-kpi"></div>
                    <div class="skeleton-kpi"></div>
                    <div class="skeleton-kpi"></div>
                </div>
                <div class="skeleton-benchmarks">
                    <div class="skeleton-bm"></div>
                    <div class="skeleton-bm"></div>
                    <div class="skeleton-bm"></div>
                </div>
            </div>
        </template>

        <!-- Card content -->
        <template if:true={hasData}>

            <!-- Context label -->
            <div class="card-top">
                <span class={statusDotClass}></span>
                <span class="card-title">{cardData.title}</span>
                <span class="card-expand" title="View details">↗</span>
            </div>

            <!-- Key question -->
            <p class="card-question">{cardData.question}</p>

            <!-- Supporting KPIs -->
            <div class="card-kpis">
                <template for:each={cardData.kpis} for:item="k">
                    <div key={k.label} class="kpi-item">
                        <div class="kpi-value-row">
                            <span class="kpi-value">{k.value}</span>
                            <span class={k.trendClass}>{k.trendIcon}</span>
                        </div>
                        <span class="kpi-label">{k.label}</span>
                    </div>
                </template>
            </div>

            <!-- Performance benchmarks -->
            <div class="benchmarks">
                <div class={poorClass}>
                    <span class="bm-dot bm-dot--poor"></span>
                    <span class="bm-level">Poor</span>
                    <span class="bm-desc">{cardData.benchmarks.poor}</span>
                </div>
                <div class={goodClass}>
                    <span class="bm-dot bm-dot--good"></span>
                    <span class="bm-level">Average</span>
                    <span class="bm-desc">{cardData.benchmarks.good}</span>
                </div>
                <div class={greatClass}>
                    <span class="bm-dot bm-dot--great"></span>
                    <span class="bm-level">Great</span>
                    <span class="bm-desc">{cardData.benchmarks.great}</span>
                </div>
            </div>

        </template>

    </div>
</template>
