<!-- force-app/main/default/lwc/outpostDevelopment/outpostDevelopment.html -->
<template>
    <lightning-card title="OutPost Development" icon-name="standard:kanban">

        <!-- Loading spinner -->
        <template if:true={isLoading}>
            <div class="op-loading">
                <lightning-spinner alternative-text="Loading..." size="medium"></lightning-spinner>
            </div>
        </template>

        <!-- Error banner -->
        <template if:true={error}>
            <div class="op-error">{error}</div>
        </template>

        <template if:false={isLoading}>

            <!-- Header: role badge + project filter -->
            <div class="op-header">
                <span class={roleBadgeClass}>{roleBadge}</span>
                <lightning-combobox
                    label="Project"
                    variant="label-hidden"
                    value={_selectedProject}
                    options={projectOptions}
                    onchange={handleProjectChange}
                    style="min-width: 220px">
                </lightning-combobox>
            </div>

            <!-- Kanban board -->
            <div class={boardClass}>
                <template for:each={columns} for:item="col">
                    <div key={col.status} class="op-col" data-status={col.status}>
                        <div class="op-col-header" style={col.headerStyle}>
                            <span class="op-col-title">{col.status}</span>
                            <span class="op-col-badge">{col.count}</span>
                        </div>
                        <div class="op-col-cards" data-status={col.status}>
                            <template if:false={col.hasCards}>
                                <div class="op-col-empty"></div>
                            </template>
                            <template for:each={col.cards} for:item="card">
                                <div
                                    key={card.id}
                                    class={card.cardClass}
                                    data-id={card.id}
                                    data-status={card.status}
                                    onpointerdown={handlePointerDown}
                                    onpointermove={handlePointerMove}
                                    onpointerup={handlePointerUp}
                                    onclick={handleCardClick}>

                                    <div class="op-card-subject">{card.subject}</div>
                                    <div class="op-card-meta">
                                        <span class={card.priorityClass}>{card.priority}</span>
                                        <span>{card.type}</span>
                                    </div>
                                    <template if:true={isOwnerView}>
                                        <div class="op-card-attr">&#x1F464; {card.supportName}</div>
                                    </template>
                                    <template if:false={isOwnerView}>
                                        <div class="op-card-attr">&#x1F4C1; {card.projectName}</div>
                                    </template>
                                    <div class="op-card-footer">
                                        <span>&#x23F1; {card.hoursLogged}h</span>
                                        <span class="op-est">est {card.hoursEstimate}h</span>
                                    </div>
                                </div>
                            </template>
                        </div>
                    </div>
                </template>
            </div>

        </template>

        <!-- ── 2-column modal ──────────────────────────────────────────── -->
        <template if:true={showModal}>
            <div class="op-backdrop" onclick={handleCloseModal}></div>

            <div class="op-modal-2col">

                <!-- LEFT: story detail -->
                <div class="op-modal-left">
                    <div class="op-modal-header">
                        <div class="op-modal-title-row">
                            <span class="op-modal-subject">{_activeCard.subject}</span>
                            <span class="op-modal-status-badge">{_activeCard.status}</span>
                        </div>
                        <button class="op-modal-close-btn" onclick={handleModalClose}>&#x2715;</button>
                    </div>
                    <p class="op-modal-drag-hint">Drag the card on the board to change status</p>

                    <div class="op-modal-body">

                        <!-- Log Time -->
                        <div class="op-log-section">
                            <h4 class="op-section-title">Log Time</h4>
                            <div class="op-log-row">
                                <lightning-input
                                    type="number"
                                    label="Hours"
                                    value={_logHours}
                                    step="0.25"
                                    min="0.25"
                                    onchange={handleLogHoursChange}>
                                </lightning-input>
                                <lightning-input
                                    type="date"
                                    label="Date"
                                    value={_logDate}
                                    onchange={handleLogDateChange}>
                                </lightning-input>
                            </div>
                            <lightning-input
                                label="Notes"
                                value={_logDesc}
                                placeholder="Optional notes..."
                                onchange={handleLogDescChange}>
                            </lightning-input>
                            <lightning-button
                                label="Log Time"
                                variant="brand"
                                onclick={handleLogTime}>
                            </lightning-button>
                        </div>

                        <!-- Case Comments -->
                        <div class="op-comments-section">
                            <h4 class="op-section-title">Notes</h4>
                            <template if:false={_comments.length}>
                                <p class="op-empty-comments">No notes yet.</p>
                            </template>
                            <template for:each={_comments} for:item="c">
                                <div key={c.id} class="op-comment">
                                    <div class="op-comment-meta">{c.authorName} &middot; {c.createdDate}</div>
                                    <div class="op-comment-body">{c.body}</div>
                                </div>
                            </template>
                            <lightning-textarea
                                label="New Note"
                                variant="label-hidden"
                                placeholder="Add a note..."
                                value={_commentText}
                                onchange={handleCommentChange}>
                            </lightning-textarea>
                            <lightning-button
                                label="Save Note"
                                onclick={handlePostComment}>
                            </lightning-button>
                        </div>

                    </div>
                </div>

                <!-- RIGHT: team chat -->
                <div class="op-modal-right">
                    <div class="op-chat-header">
                        <span class="op-chat-title">&#x1F4AC; Team Chat</span>
                        <span class="op-chat-hint">Saved to Chatter on this story</span>
                    </div>

                    <!-- Message list -->
                    <div class="op-chat-messages">
                        <template if:false={hasChatMessages}>
                            <div class="op-chat-empty">No messages yet. Start the conversation!</div>
                        </template>
                        <template for:each={_chatMessages} for:item="msg">
                            <div key={msg.id} class={msg.bubbleClass}>
                                <div class={msg.metaClass}>{msg.authorName} &middot; {msg.createdDate}</div>
                                <div class={msg.bubbleInnerClass}>{msg.body}</div>
                            </div>
                        </template>
                    </div>

                    <!-- Input area -->
                    <div class="op-chat-input-area">

                        <!-- @mention dropdown -->
                        <template if:true={_showMentionDropdown}>
                            <div class="op-mention-dropdown">
                                <template for:each={_mentionResults} for:item="u">
                                    <div
                                        key={u.value}
                                        class="op-mention-item"
                                        data-value={u.value}
                                        data-label={u.label}
                                        onmousedown={handleSelectMention}>
                                        <span class="op-mention-avatar">&#x1F464;</span>
                                        <span class="op-mention-name">{u.label}</span>
                                    </div>
                                </template>
                            </div>
                        </template>

                        <textarea
                            class="op-chat-textarea"
                            placeholder="Message... Type @ to mention someone"
                            value={_chatText}
                            oninput={handleChatInput}
                            onkeydown={handleChatKeydown}>
                        </textarea>
                        <div class="op-chat-send-row">
                            <span class="op-chat-hint-small">Enter to send &nbsp;·&nbsp; Shift+Enter for new line</span>
                            <button class="op-chat-send-btn" onclick={handleSendChat}>Send &#x2192;</button>
                        </div>
                    </div>
                </div>

            </div>
        </template>

    </lightning-card>
</template>
